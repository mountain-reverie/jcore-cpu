    wbus = "TEMP0"
    pc = "HOLD"
  [[instr.slots]]                 # slot6-8: wait for TEMP0 load-commit
    pc = "HOLD"
  [[instr.slots]]
    pc = "HOLD"
  [[instr.slots]]
    pc = "HOLD"
  [[instr.slots]]                 # slot9: extract bit imm3 of TEMP0, INVERT -> T
    logic = "AND"                 # (NO store). logic_sr=ZERO gives T := (v == 0),
    xbus = "TEMP0"                # the inverse sense of BLD's NOT_ZERO -- exactly
    ybus = "MASK3_64"              # bldnot's "NOT bit -> T" semantics.
    logic_sr = "ZERO"
    sr = "LOGIC"
    pc = "HOLD"
  [[instr.slots]]                 # slot10-11: filler (align with RMW ops' timing)
    pc = "HOLD"
  [[instr.slots]]
    pc = "HOLD"
  [[instr.slots]]                 # slot12: NO store -- just terminal dispatch.
    pc = "INC"

