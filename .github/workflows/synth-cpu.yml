name: synth-cpu
# Full-cpu synthesis CI. Gates on synthesizability (no latches/loops via
# `check -assert`) and FPGA fit; timing is REPORTED, not gated.
#   synth-asic: generic yosys synth + check + cell/area stats
#   synth-ecp5: synth_ecp5 (abc9) + nextpnr-ecp5 (LFE5U-85F) + ecppack
# Timing is reported but not gated: with the issue/slot false loop broken
# (core/datapath.vhm) abc9 runs and the core reaches ~40 MHz on the 85F, still
# under 50. Tightening to a hard timing gate is a follow-up (critical-path work).
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

env:
  ECP5_TARGET_MHZ: "50"
  # Regression floor for the representative (cpu_timing_top harness) Fmax. The
  # core measures ~42-43 MHz today; 40 gives margin for netlist drift while
  # catching real erosion (e.g. a re-introduced false loop). nextpnr is
  # deterministic per seed, so this does not flake. Re-baseline on intentional
  # toolchain bumps.
  ECP5_FMIN_MHZ: "40"

# Container run: steps default to `sh` (dash), which rejects `set -o pipefail`
# and other bashisms. Force bash (present in the image) for all run steps.
defaults:
  run:
    shell: bash

jobs:
  synth-asic:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    strategy:
      fail-fast: false
      matrix:
        variant: [j1, j2, j4]
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          # Version banners pipe into head; under -o pipefail the producer's
          # SIGPIPE (exit 141) when head closes the pipe early would flake the
          # step. Disable pipefail for the banners; keep it for the plugin gate.
          set +o pipefail
          ghdl --version | head -1; yosys -V | head -1
          set -o pipefail
          yosys -m ghdl -p 'help ghdl' >/dev/null && echo "ghdl plugin OK"
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (generic) + assert no latches
        # cpu_synth.sh runs `check -assert` (fails on latches/multi-driver) and
        # writes build/cpu_asic.v. This step IS the synthesizability gate.
        # SYNTH_VARIANT selects the cpu top configuration (j1/j2/j4); j2 is
        # byte-identical to the historical J2-only invocation.
        run: SYNTH_VARIANT=${{ matrix.variant }} synth/cpu_synth.sh asic
      - name: Report cell/area stats
        run: |
          set -euo pipefail
          yosys -p "read_verilog build/cpu_asic.v; stat" | tee build/asic_stat.txt
          cells=$(awk '/Number of cells:/ {n=$NF} END{print n}' build/asic_stat.txt)
          {
            echo "### ASIC generic synth"
            echo "- cells: ${cells:-?}"
            echo "- gate: \`check -assert\` (no latches / multi-driver) passed"
            echo "- timing: reported on ECP5; not gated (see workflow header)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Full-CPU STA (Nangate45 + OpenSTA)
        run: synth/cpu_sta.sh   # non-gating; writes build/cpu_asic_sta.rpt
        env:
          NANGATE_LIB: /opt/nangate45/nangate45.lib
      - name: Emit ASIC metrics
        continue-on-error: true
        env:
          NANGATE_LIB: /opt/nangate45/nangate45.lib
        run: |
          set -euo pipefail
          # Per-block area from the Nangate45-mapped netlist (written by cpu_sta.sh).
          # Guarded so a missing mapped netlist (STA skipped) never fails the step.
          if [ -f build/cpu_asic_mapped.v ]; then
            yosys -p "read_verilog build/cpu_asic_mapped.v; stat -liberty $NANGATE_LIB" \
              | tee build/asic_area_stat.txt || true
          else
            echo "WARN: build/cpu_asic_mapped.v absent — ASIC area/timing metrics will be partial" >&2
          fi
          period_ns=$(awk -v m="${ECP5_TARGET_MHZ}" 'BEGIN{printf "%.4f",1000.0/m}')
          python3 synth/metrics.py --target asic-nangate45 \
            --variant "${{ matrix.variant }}" \
            --commit "${GITHUB_SHA}" --out synth/metrics/asic-nangate45.json \
            --stat build/asic_area_stat.txt --sta build/cpu_asic_sta.rpt \
            --period-ns "$period_ns" || true
      - name: Upload ASIC metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-asic-${{ matrix.variant }}
          path: synth/metrics/*.json
          retention-days: 14
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-asic-${{ matrix.variant }}
          path: build/
          retention-days: 14

  synth-ecp5:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    strategy:
      fail-fast: false
      matrix:
        variant: [j2, j4]   # J1's authoritative FPGA target is iCE40 up5k (see synth-ice40)
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          # Version banners pipe into head; under -o pipefail the producer's
          # SIGPIPE (exit 141) when head closes the pipe early would flake the
          # step. Disable pipefail for the banners; keep it for the tool gate.
          set +o pipefail
          ghdl --version | head -1; yosys -V | head -1
          set -o pipefail
          nextpnr-ecp5 --version; ecppack --help >/dev/null && echo "ecppack OK"
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (synth_ecp5, abc9) + assert no latches
        # SYNTH_VARIANT selects the cpu top configuration (j1/j2/j4); j2 is
        # byte-identical to the historical J2-only invocation.
        run: SYNTH_VARIANT=${{ matrix.variant }} synth/cpu_synth.sh ecp5
      - name: Guard — slot_o is not in any combinational loop
        # Regression guard for the issue/slot loop break (core/datapath.vhm):
        # slot_o must stay out of every SCC. A residual SCC not involving slot_o
        # may remain (abc9 resolves it); we only fail if slot_o reappears.
        # Elaborates cpu_synth_direct (variant-independent), so run it once on
        # the j2 leg instead of identically across all three matrix variants.
        if: matrix.variant == 'j2'
        run: |
          set -euo pipefail
          yosys -m ghdl -p "
            ghdl --std=93 -fexplicit --ieee=synopsys --workdir=$(mktemp -d) \
              cpu2j0_pkg.vhd core/components_pkg.vhd core/mult_pkg.vhd core/datapath_pkg.vhd \
              decode/decode_pkg.vhd core/cpu.vhd core/mult.vhd core/datapath.vhd \
              core/register_file.vhd core/register_file_flops.vhd core/register_file_two_bank.vhd \
              decode/decode.vhd decode/decode_body.vhd decode/decode_table.vhd \
              decode/decode_table_direct.vhd decode/decode_table_direct_config.vhd \
              decode/decode_core.vhd synth/cpu_synth_config.vhd -e cpu_synth_direct;
            hierarchy -top cpu; proc; flatten; opt; scc -nofeedback -select; select -list;
          " > build/scc_report.txt 2>&1
          grep -E 'Found [0-9]+ SCCs' build/scc_report.txt | tail -1 || true
          if grep -E '^cpu/' build/scc_report.txt | grep -q 'slot_o'; then
            echo "REGRESSION: slot_o is back in a combinational loop"; exit 1
          fi
          echo "OK: slot_o is not in any SCC"
      - name: Place and route (nextpnr-ecp5, LFE5U-85F) — fit gate
        run: |
          set -euo pipefail
          # The issue/slot false loop is broken (core/datapath.vhm), so abc9 runs
          # and nextpnr needs no --ignore-loops. --timing-allow-fail keeps the
          # ~40 MHz (< 50) result reported rather than failing. We GATE on fit
          # (P&R must complete) and REPORT timing. No `| tee`, so set -e fails the
          # step on a real P&R/fit error.
          nextpnr-ecp5 --85k --package CABGA381 \
            --json build/cpu_ecp5.json \
            --lpf synth/ulx3s_cpu.lpf --lpf-allow-unconstrained \
            --timing-allow-fail \
            --textcfg build/cpu_ecp5.config \
            --report build/cpu_ecp5_report.json > build/nextpnr.log 2>&1
          tail -60 build/nextpnr.log
      - name: Pack bitstream — fit gate
        run: ecppack build/cpu_ecp5.config build/cpu_ecp5.bit && ls -l build/cpu_ecp5.bit
      - name: Report Fmax + utilisation
        run: |
          set -eu
          {
            echo "### ECP5 synth + P&R (LFE5U-85F) — fits & packs a bitstream"
            grep -oE "Max frequency for clock '[^']*': [0-9.]+ MHz.*" build/nextpnr.log | tail -2 | sed 's/^/- Fmax: /' || true
            echo "- utilisation:"
            grep -E "Info:[[:space:]]+(TRELLIS_COMB|TRELLIS_FF|DP16KD|MULT18X18D|ALU54B|TRELLIS_IO|EHXPLLL):" build/nextpnr.log | sed -E 's/^Info:[[:space:]]*/    /' || true
            echo "- target ${ECP5_TARGET_MHZ} MHz is reported, not gated (see workflow header)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: ECP5 representative timing (cpu_timing_top harness) — P&R
        # The bare-cpu Fmax above is depressed by the unconstrained-IO artifact.
        # cpu_timing_top registers the boundary to 4 IO so nextpnr reports a true
        # register->core->register Fmax (~42 MHz). Non-gating P&R: produces
        # build/nextpnr_timing.log, which both the metric emit (below) and the
        # regression gate (further below) consume. The gate runs AFTER emit so
        # the dashboard still captures the data point on a real regression.
        run: |
          set -uo pipefail
          SYNTH_VARIANT=${{ matrix.variant }} synth/cpu_synth.sh timing
          nextpnr-ecp5 --85k --package CABGA381 --json build/cpu_timing.json \
            --lpf synth/ulx3s_cpu.lpf --lpf-allow-unconstrained --timing-allow-fail \
            --textcfg build/cpu_timing.config > build/nextpnr_timing.log 2>&1 || true
          fmax=$(grep -oE "Max frequency for clock '[^']*': [0-9.]+ MHz" build/nextpnr_timing.log \
                 | tail -1 | grep -oE '[0-9.]+ MHz' | grep -oE '[0-9.]+' || true)
          {
            echo "### ECP5 representative timing (cpu_timing_top harness)"
            echo "- Fmax: ${fmax:-?} MHz  (regression floor ${ECP5_FMIN_MHZ} MHz)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Emit ECP5 metrics
        continue-on-error: true
        run: |
          set -uo pipefail
          # util + IO-unconstrained Fmax from the bare-cpu P&R (build/nextpnr.log);
          # the representative Fmax from the harness P&R (build/nextpnr_timing.log).
          python3 synth/metrics.py --target ecp5-lfe5u-85f \
            --variant "${{ matrix.variant }}" \
            --commit "${GITHUB_SHA}" --out synth/metrics/ecp5-lfe5u-85f.json \
            --nextpnr build/nextpnr.log --nextpnr-timing build/nextpnr_timing.log || true
      - name: Upload ECP5 metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-ecp5-${{ matrix.variant }}
          path: synth/metrics/*.json
          retention-days: 14
      - name: ECP5 Fmax regression gate
        # Gate on the representative harness Fmax floor so frequency can't
        # silently erode (e.g. a re-introduced false loop). Runs after emit so a
        # genuine regression still records its data point on the dashboard.
        # The cpu_timing_top harness is variant-independent (fixed J2 config), so
        # we gate on the j2 leg only — J1's slower/smaller results must not break
        # the floor, and the j4 leg duplicates j2 today.
        if: matrix.variant == 'j2'
        run: |
          set -euo pipefail
          fmax=$(grep -oE "Max frequency for clock '[^']*': [0-9.]+ MHz" build/nextpnr_timing.log \
                 | tail -1 | grep -oE '[0-9.]+ MHz' | grep -oE '[0-9.]+' || true)
          awk -v f="${fmax:-0}" -v floor="${ECP5_FMIN_MHZ}" 'BEGIN{
            if (f+0 < floor+0) { printf "REGRESSION: Fmax %.2f MHz < floor %s MHz\n", f, floor; exit 1 }
            printf "OK: Fmax %.2f MHz >= floor %s MHz\n", f, floor }'
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-ecp5-${{ matrix.variant }}
          path: build/
          retention-days: 14

  synth-ice40:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    strategy:
      fail-fast: false
      matrix:
        variant: [j1]   # iCE40 up5k is J1's authoritative target only
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          set +o pipefail
          ghdl --version | head -1; yosys -V | head -1
          set -o pipefail
          nextpnr-ice40 --version
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (synth_ice40, cpu_timing_top harness)
        run: SYNTH_VARIANT=${{ matrix.variant }} synth/cpu_synth.sh ice40
      - name: Place and route (nextpnr-ice40, up5k) — non-gating
        # Report-only: --timing-allow-fail keeps P&R completing (a timing-only
        # miss stays exit 0 = P&R completed) without a declared up5k clock. We do
        # NOT gate CI on fit. But we DO capture nextpnr's real exit status into
        # build/pnr_ok so the milestone's --pnr-ok guard is honest: nextpnr prints
        # the utilisation table after PLACEMENT, before ROUTING, so a run where
        # placement fits but routing fails would still emit ICESTORM_LC. Without
        # this flag the milestone could false-fire on that case.
        run: |
          set -uo pipefail
          if nextpnr-ice40 --up5k --package sg48 \
               --json build/cpu_ice40.json \
               --pcf synth/up5k_cpu.pcf --pcf-allow-unconstrained \
               --timing-allow-fail \
               --asc build/cpu_ice40.asc > build/nextpnr_ice40.log 2>&1; then
            echo true > build/pnr_ok
          else
            echo false > build/pnr_ok
          fi
          tail -40 build/nextpnr_ice40.log
      - name: Report util + Fmax
        run: |
          set -eu
          {
            echo "### iCE40 up5k P&R (cpu_timing_top harness) — variant ${{ matrix.variant }}"
            grep -E "Info:[[:space:]]+(ICESTORM_LC|ICESTORM_RAM|ICESTORM_DSP|SB_IO|SB_GB):" build/nextpnr_ice40.log | sed -E 's/^Info:[[:space:]]*/    /' || true
            grep -oE "Max frequency for clock '[^']*': [0-9.]+ MHz" build/nextpnr_ice40.log | tail -1 | sed 's/^/- Fmax: /' || true
            echo "- budget (report-only): SB_LUT4 < 5280, EBR <= 30, SB_MAC16 <= 8"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Emit iCE40 metrics
        continue-on-error: true
        run: |
          set -uo pipefail
          python3 synth/metrics.py --target ice40-up5k \
            --variant "${{ matrix.variant }}" \
            --commit "${GITHUB_SHA}" --out synth/metrics/ice40-up5k.json \
            --nextpnr-ice40 build/nextpnr_ice40.log || true
          # Carry the real P&R exit status alongside the metric so the (cross-job)
          # milestone evaluate step can honour --pnr-ok. The suite builder globs
          # only *.json, so this marker never pollutes the benchmark data.
          cp -f build/pnr_ok synth/metrics/ice40-up5k.pnr_ok 2>/dev/null \
            || echo false > synth/metrics/ice40-up5k.pnr_ok
      - name: Upload iCE40 metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-ice40-${{ matrix.variant }}
          path: |
            synth/metrics/*.json
            synth/metrics/*.pnr_ok
          retention-days: 14
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-ice40-${{ matrix.variant }}
          path: build/
          retention-days: 14

  # Benchmark comparison runs on PRs AND master push: it posts the regression
  # comment/alert and assembles the site tree. It deliberately does NOT declare
  # the github-pages environment, so a PR (which cannot deploy to that
  # environment) is never rejected by its branch-protection rule. Deployment is
  # confined to the separate push-only deploy-pages job below.
  benchmark:
    needs: [synth-asic, synth-ecp5, synth-ice40]
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      # Download every per-variant metric artifact (metrics-asic-{j1,j2,j4} and
      # metrics-ecp5-{j1,j2,j4}). merge-multiple is intentionally OFF: each
      # variant writes the SAME filename (asic-nangate45.json / ecp5-lfe5u-85f.json),
      # so flattening would clobber sibling variants. Instead each artifact lands
      # in its own subdir (metrics-in/metrics-<target>-<variant>/...), and the
      # build step globs recursively. Each doc carries its own `variant`
      # (== extra), so the three series overlay on the dashboard.
      - name: Download all variant metrics
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: metrics-in
        continue-on-error: true
      - name: Build action inputs
        run: |
          set -euo pipefail
          mkdir -p site/bench-size site/bench-speed metrics-in
          shopt -s nullglob globstar
          # Recurse: each per-variant artifact lands in its own metrics-in subdir.
          inputs=(metrics-in/**/*.json)
          if [ ${#inputs[@]} -eq 0 ]; then
            echo "WARN: no metric artifacts found — emitting empty suites" >&2
            echo "[]" > build-size.json; echo "[]" > build-speed.json
          else
            python3 synth/to_gha_bench.py "${inputs[@]}" \
              --size-out build-size.json --speed-out build-speed.json
          fi
          ls -l build-size.json build-speed.json
      - name: Bootstrap prior history from the live site
        run: |
          set -euo pipefail
          base="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}"
          for kind in size speed; do
            url="$base/bench-$kind/benchmark-data.json"
            if curl -fsSL --head "$url" >/dev/null 2>&1; then
              curl -fsSL "$url" -o "site/bench-$kind/benchmark-data.json"
              echo "fetched prior $kind history"
            else
              : > "site/bench-$kind/benchmark-data.json"
              echo "no prior $kind history (first run)"
            fi
          done
      - name: Snapshot prior history for the iCE40 milestone (pre-append)
        run: |
          if [ -s site/bench-size/benchmark-data.json ]; then
            cp -f site/bench-size/benchmark-data.json ice40_prev_history.json
          else
            echo '{"entries":{}}' > ice40_prev_history.json
          fi
      - name: Append size suite
        uses: benchmark-action/github-action-benchmark@v1
        continue-on-error: true
        with:
          name: synth-size
          tool: customSmallerIsBetter
          output-file-path: build-size.json
          external-data-json-path: site/bench-size/benchmark-data.json
          benchmark-data-dir-path: site/bench-size
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Append speed suite
        uses: benchmark-action/github-action-benchmark@v1
        continue-on-error: true
        with:
          name: synth-speed
          tool: customBiggerIsBetter
          output-file-path: build-speed.json
          external-data-json-path: site/bench-speed/benchmark-data.json
          benchmark-data-dir-path: site/bench-speed
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble site
        run: |
          set -euo pipefail
          for kind in size speed; do
            f="site/bench-$kind/benchmark-data.json"
            # If an Append step no-op'd (empty suite / comment 403 on a fork PR),
            # the data file may be empty. Substitute a valid empty history so the
            # generated data.js is always parseable JavaScript.
            if [ ! -s "$f" ]; then
              echo '{"lastUpdate":0,"repoUrl":"","entries":{}}' > "$f"
            fi
            echo "window.BENCHMARK_DATA = $(cat "$f")" > "site/bench-$kind/data.js"
          done
          cp dashboard/index.html dashboard/app.js site/
          mkdir -p site/fixtures && cp dashboard/fixtures/data.js site/fixtures/
      - name: iCE40 up5k fit milestone — evaluate
        id: ice40_fit
        if: github.event_name == 'pull_request'
        run: |
          set -uo pipefail
          cur=$(ls metrics-in/metrics-ice40-j1/*.json 2>/dev/null | head -1 || true)
          if [ -z "${cur:-}" ]; then
            echo "no ice40 metrics artifact — skipping milestone"
            echo "fire=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Pass --pnr-ok only when nextpnr actually completed P&R (placement AND
          # routing), propagated from the synth-ice40 job via the artifact.
          pnr_ok=$(cat metrics-in/metrics-ice40-j1/ice40-up5k.pnr_ok 2>/dev/null || echo false)
          pnr_flag=""
          [ "$pnr_ok" = "true" ] && pnr_flag="--pnr-ok"
          fire=$(python3 synth/ice40_fit.py --current "$cur" \
                   --history ice40_prev_history.json $pnr_flag \
                   --dashboard-url "https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/" \
                   --out ice40_milestone.md | sed -n 's/^fire=//p')
          echo "fire=${fire:-false}" >> "$GITHUB_OUTPUT"
          echo "milestone fire=${fire:-false}"
      - name: iCE40 up5k fit milestone — comment
        if: github.event_name == 'pull_request' && steps.ice40_fit.outputs.fire == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ice40-up5k-fit-milestone -->';
            const body = fs.readFileSync('ice40_milestone.md', 'utf8');
            // Paginate: a busy PR can exceed one page, and the marker may be on
            // an earlier page — missing it would double-post the milestone.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100,
            });
            if (comments.some(c => c.body && c.body.includes(marker))) {
              core.info('iCE40 fit milestone comment already present — skipping');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
            core.info('posted iCE40 up5k fit milestone comment');
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # Deployment is the ONLY consumer of the github-pages environment, and it runs
  # only on push (the workflow's sole push trigger is master). On PRs this job is
  # skipped entirely, so the environment's branch-protection rule is never
  # evaluated and the run is not rejected.
  deploy-pages:
    needs: benchmark
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
