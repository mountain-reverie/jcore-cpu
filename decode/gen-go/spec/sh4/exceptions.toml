  [[instr.slots]]                 # EXPEVT <- fault cause
    xbus = "192"
    sr = "EXPEVT"
    pc = "HOLD"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "1056"
    arith = "ADD"
