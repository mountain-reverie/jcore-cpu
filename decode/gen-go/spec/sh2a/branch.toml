[[instr]]
  name = "RTS/N"
  format = "0"
  opcode = "0000 0000 0110 1011"
  operation = "PR -> PC, no delay slot"

  [[instr.slots]]
    ybus = "PR"
    zbus = "PC"
    zbus_sel = "Y"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"

[[instr]]
  name = "JSR/N @Rm"
  format = "m"
  opcode = "0100 mmmm 0100 1011"
  operation = "PC -> PR, Rm -> PC, no delay slot"

  # jsr/n has NO delay slot, so the return address saved to PR must be
  # call+2 (the instruction immediately after jsr/n) — NOT call+4, which
  # base delayed JSR saves via pr="RD PC" (the wrpr-pc path). Here the PC
  # routed onto the ALU/zbus in this first slot is already call+2, so we
  # pass it through unchanged (PC+0) and write it to PR via pr="RD Z".
  # This mirrors the unconditional no-delay RTS/N shape (no dispatch=NT).
  [[instr.slots]]
    xbus = "PC"
    alu_y = "0"
    arith = "ADD"
    zbus_sel = "ARITH"
    pr = "RD Z"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    xbus = "Rm"
    alu_y = "0"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"

[[instr]]
  name = "RTV/N Rm"
  format = "m"
  opcode = "0000 mmmm 0111 1011"
  operation = "Rm -> R0, PR -> PC, no delay slot"

  [[instr.slots]]
    ybus = "Rm"
    zbus = "R0"
    zbus_sel = "Y"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    ybus = "PR"
    zbus = "PC"
    zbus_sel = "Y"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
