name: synth

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  synth-check:
    runs-on: ubuntu-latest
    # ghdl/synth:beta bundles a from-source GHDL with the --synth backend
    # (and yosys + ghdl-yosys-plugin). The apt `ghdl` package is too old to
    # reliably reproduce the ill-formed-clock rejection, so use this image.
    container: ghdl/synth:beta
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4

      - name: Checkout jcore-soc (TOOLS_DIR / v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc

      - name: Tool versions
        run: |
          ghdl --version | head -3
          perl --version | head -2

      - name: Run synthesis gate
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: ./tools/synth-check.sh

  tag-release:
    needs: synth-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need all tags to compute the next patch

      - name: Compute and push next SemVer patch tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Highest existing vMAJOR.MINOR.PATCH tag (ignores non-SemVer tags).
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
                      | sort -t. -k1.2,1n -k2,2n -k3,3n \
                      | tail -1)"
          if [ -z "$latest" ]; then
            next="v1.0.0"   # seed
          else
            ver="${latest#v}"
            major="${ver%%.*}"; rest="${ver#*.}"
            minor="${rest%%.*}"; patch="${rest##*.}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Latest: ${latest:-<none>}  Next: $next"
          git tag -a "$next" -m "Release $next (synth gate green on master)"
          git push origin "$next"
