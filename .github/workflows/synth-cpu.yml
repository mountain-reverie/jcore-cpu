name: synth-cpu
# Full-cpu synthesis for ASIC (generic + Nangate45 + OpenSTA) and ECP5
# (synth_ecp5 + nextpnr-ecp5 + ecppack). Runs in the prebuilt CI image.
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

env:
  ECP5_TARGET_MHZ: "50"
  STA_PERIOD_NS: "20"          # 50 MHz
  STA_IO_DELAY: "1.0"

jobs:
  synth-asic:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          ghdl --version | head -1; yosys -V | head -1
          yosys -m ghdl -p 'help ghdl' >/dev/null && echo "ghdl plugin OK"
          sta -version 2>&1 | head -1 || true
          echo "NANGATE_LIB=$NANGATE_LIB"; test -f "$NANGATE_LIB"
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (generic)
        run: synth/cpu_synth.sh asic
      - name: Tech-map to Nangate45
        run: |
          set -eux
          yosys -p "
            read_verilog build/cpu_asic.v;
            dfflibmap -liberty $NANGATE_LIB;
            abc -liberty $NANGATE_LIB;
            splitnets -ports; clean -purge;
            write_verilog build/cpu_asic_mapped.v;
          "
      - name: OpenSTA timing
        run: |
          set -eux
          cat > build/sta_cpu.tcl <<TCL
          read_liberty $NANGATE_LIB
          read_verilog build/cpu_asic_mapped.v
          link_design cpu
          create_clock -name clk -period $STA_PERIOD_NS [get_ports clk]
          set_input_delay  -clock clk $STA_IO_DELAY [all_inputs]
          set_output_delay -clock clk $STA_IO_DELAY [all_outputs]
          report_checks -path_delay max -format short
          report_wns
          report_tns
          exit
          TCL
          sta -no_init -no_splash build/sta_cpu.tcl | tee build/sta_cpu.txt
      - name: Gate + summary
        run: |
          set -eu
          wns=$(awk '/^wns/ {print $NF; exit}' build/sta_cpu.txt)
          tns=$(awk '/^tns/ {print $NF; exit}' build/sta_cpu.txt)
          {
            echo "### ASIC synth (Nangate45)"
            echo "- WNS: ${wns:-?} ns  |  TNS: ${tns:-?} ns  (period ${STA_PERIOD_NS} ns)"
          } >> "$GITHUB_STEP_SUMMARY"
          case "${wns:-}" in
            "" ) echo "could not parse WNS"; exit 1 ;;
            -* ) echo "WNS negative ($wns): timing not met"; exit 1 ;;
          esac
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-asic
          path: build/
          retention-days: 14

  synth-ecp5:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          ghdl --version | head -1; yosys -V | head -1
          nextpnr-ecp5 --version; ecppack --help >/dev/null && echo "ecppack OK"
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (synth_ecp5 -noabc9)
        run: synth/cpu_synth.sh ecp5
      - name: Document the false SCC (diagnostic, non-failing)
        run: |
          set -eux
          yosys -m ghdl -p "
            ghdl --std=93 -fexplicit --ieee=synopsys --workdir=$(mktemp -d) \
              cpu2j0_pkg.vhd core/components_pkg.vhd core/mult_pkg.vhd core/datapath_pkg.vhd \
              decode/decode_pkg.vhd core/cpu.vhd core/mult.vhd core/datapath.vhd \
              core/register_file.vhd core/register_file_flops.vhd core/register_file_two_bank.vhd \
              decode/decode.vhd decode/decode_body.vhd decode/decode_table.vhd \
              decode/decode_table_direct.vhd decode/decode_table_direct_config.vhd \
              decode/decode_core.vhd synth/cpu_synth_config.vhd -e cpu_synth_direct;
            hierarchy -top cpu; proc; flatten; opt; scc -nofeedback;
          " 2>&1 | tee build/scc_report.txt | grep -E 'Found [0-9]+ SCCs' || true
      - name: Place and route (nextpnr-ecp5, LFE5U-85F)
        run: |
          set -eux
          nextpnr-ecp5 --85k --package CABGA381 \
            --json build/cpu_ecp5.json \
            --lpf synth/ulx3s_cpu.lpf --lpf-allow-unconstrained \
            --textcfg build/cpu_ecp5.config \
            --report build/cpu_ecp5_report.json \
            2>&1 | tee build/nextpnr.log
      - name: Pack bitstream
        run: ecppack build/cpu_ecp5.config build/cpu_ecp5.bit
      - name: Gate + summary
        run: |
          set -eu
          fmax=$(grep -oE "Max frequency for clock '[^']*': [0-9.]+ MHz" build/nextpnr.log | tail -1 || true)
          {
            echo "### ECP5 synth + P&R (LFE5U-85F)"
            echo "- ${fmax:-Fmax: see log}"
            grep -E "Info: (Total LUT4s|Total DFFs|.*used)" build/nextpnr.log | sed 's/^/- /' | head -20 || true
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-ecp5
          path: build/
          retention-days: 14
