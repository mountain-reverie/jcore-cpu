name: synth-cpu
# Full-cpu synthesis CI. Gates on synthesizability (no latches/loops via
# `check -assert`) and FPGA fit; timing is REPORTED, not gated.
#   synth-asic: generic yosys synth + check + cell/area stats
#   synth-ecp5: synth_ecp5 -noabc9 + nextpnr-ecp5 (LFE5U-85F) + ecppack
# Why timing is not gated yet: the cpu has one documented false combinational
# SCC (datapath/decode forwarding) that forces synth_ecp5 -noabc9 and nextpnr
# --ignore-loops; with abc9 disabled the core does not reach 50 MHz. Meaningful
# timing gating is a follow-up tied to breaking that false loop.
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

env:
  ECP5_TARGET_MHZ: "50"

# Container run: steps default to `sh` (dash), which rejects `set -o pipefail`
# and other bashisms. Force bash (present in the image) for all run steps.
defaults:
  run:
    shell: bash

jobs:
  synth-asic:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          ghdl --version | head -1; yosys -V | head -1
          yosys -m ghdl -p 'help ghdl' >/dev/null && echo "ghdl plugin OK"
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (generic) + assert no latches
        # cpu_synth.sh runs `check -assert` (fails on latches/multi-driver) and
        # writes build/cpu_asic.v. This step IS the synthesizability gate.
        run: synth/cpu_synth.sh asic
      - name: Report cell/area stats
        run: |
          set -euo pipefail
          yosys -p "read_verilog build/cpu_asic.v; stat" | tee build/asic_stat.txt
          cells=$(awk '/Number of cells:/ {n=$NF} END{print n}' build/asic_stat.txt)
          {
            echo "### ASIC generic synth"
            echo "- cells: ${cells:-?}"
            echo "- gate: \`check -assert\` (no latches / multi-driver) passed"
            echo "- timing: reported on ECP5; not gated (see workflow header)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Full-CPU STA (Nangate45 + OpenSTA)
        run: synth/cpu_sta.sh   # non-gating; writes build/cpu_asic_sta.rpt
        env:
          NANGATE_LIB: /opt/nangate45/nangate45.lib
      - name: Emit ASIC metrics
        continue-on-error: true
        env:
          NANGATE_LIB: /opt/nangate45/nangate45.lib
        run: |
          set -euo pipefail
          # Per-block area from the Nangate45-mapped netlist (written by cpu_sta.sh).
          # Guarded so a missing mapped netlist (STA skipped) never fails the step.
          if [ -f build/cpu_asic_mapped.v ]; then
            yosys -p "read_verilog build/cpu_asic_mapped.v; stat -liberty $NANGATE_LIB" \
              | tee build/asic_area_stat.txt || true
          else
            echo "WARN: build/cpu_asic_mapped.v absent — ASIC area/timing metrics will be partial" >&2
          fi
          period_ns=$(awk -v m="${ECP5_TARGET_MHZ}" 'BEGIN{printf "%.4f",1000.0/m}')
          python3 synth/metrics.py --target asic-nangate45 \
            --commit "${GITHUB_SHA}" --out synth/metrics/asic-nangate45.json \
            --stat build/asic_area_stat.txt --sta build/cpu_asic_sta.rpt \
            --period-ns "$period_ns" || true
      - name: Upload ASIC metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-asic
          path: synth/metrics/*.json
          retention-days: 14
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-asic
          path: build/
          retention-days: 14

  synth-ecp5:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          ghdl --version | head -1; yosys -V | head -1
          nextpnr-ecp5 --version; ecppack --help >/dev/null && echo "ecppack OK"
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (synth_ecp5 -noabc9) + assert no latches
        run: synth/cpu_synth.sh ecp5
      - name: Document the false SCC (diagnostic, non-failing)
        run: |
          set -eux
          yosys -m ghdl -p "
            ghdl --std=93 -fexplicit --ieee=synopsys --workdir=$(mktemp -d) \
              cpu2j0_pkg.vhd core/components_pkg.vhd core/mult_pkg.vhd core/datapath_pkg.vhd \
              decode/decode_pkg.vhd core/cpu.vhd core/mult.vhd core/datapath.vhd \
              core/register_file.vhd core/register_file_flops.vhd core/register_file_two_bank.vhd \
              decode/decode.vhd decode/decode_body.vhd decode/decode_table.vhd \
              decode/decode_table_direct.vhd decode/decode_table_direct_config.vhd \
              decode/decode_core.vhd synth/cpu_synth_config.vhd -e cpu_synth_direct;
            hierarchy -top cpu; proc; flatten; opt; scc -nofeedback;
          " 2>&1 | tee build/scc_report.txt | grep -E 'Found [0-9]+ SCCs' || true
      - name: Place and route (nextpnr-ecp5, LFE5U-85F) — fit gate
        run: |
          set -euo pipefail
          # --ignore-loops + --timing-allow-fail: the cpu has a documented false
          # combinational SCC (build/scc_report.txt) that nextpnr's timing
          # analyzer rejects, and with -noabc9 the core does not reach 50 MHz.
          # We GATE on fit (P&R must complete) and REPORT timing. No `| tee`, so
          # set -e fails the step on a real P&R/fit error.
          nextpnr-ecp5 --85k --package CABGA381 \
            --json build/cpu_ecp5.json \
            --lpf synth/ulx3s_cpu.lpf --lpf-allow-unconstrained \
            --ignore-loops --timing-allow-fail \
            --textcfg build/cpu_ecp5.config \
            --report build/cpu_ecp5_report.json > build/nextpnr.log 2>&1
          tail -60 build/nextpnr.log
      - name: Pack bitstream — fit gate
        run: ecppack build/cpu_ecp5.config build/cpu_ecp5.bit && ls -l build/cpu_ecp5.bit
      - name: Report Fmax + utilisation
        run: |
          set -eu
          {
            echo "### ECP5 synth + P&R (LFE5U-85F) — fits & packs a bitstream"
            grep -oE "Max frequency for clock '[^']*': [0-9.]+ MHz.*" build/nextpnr.log | tail -2 | sed 's/^/- Fmax: /' || true
            echo "- utilisation:"
            grep -E "Info:[[:space:]]+(TRELLIS_COMB|TRELLIS_FF|DP16KD|MULT18X18D|ALU54B|TRELLIS_IO|EHXPLLL):" build/nextpnr.log | sed -E 's/^Info:[[:space:]]*/    /' || true
            echo "- target ${ECP5_TARGET_MHZ} MHz is reported, not gated (see workflow header)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Emit ECP5 metrics
        continue-on-error: true
        run: |
          set -euo pipefail
          python3 synth/metrics.py --target ecp5-lfe5u-85f \
            --commit "${GITHUB_SHA}" --out synth/metrics/ecp5-lfe5u-85f.json \
            --nextpnr build/nextpnr.log || true
      - name: Upload ECP5 metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-ecp5
          path: synth/metrics/*.json
          retention-days: 14
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-ecp5
          path: build/
          retention-days: 14

  publish-pages:
    needs: [synth-asic, synth-ecp5]
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download ASIC metrics
        uses: actions/download-artifact@v4
        with:
          name: metrics-asic
          path: metrics-in
        continue-on-error: true
      - name: Download ECP5 metrics
        uses: actions/download-artifact@v4
        with:
          name: metrics-ecp5
          path: metrics-in
        continue-on-error: true
      - name: Build action inputs
        run: |
          set -euo pipefail
          mkdir -p site/bench-size site/bench-speed metrics-in
          shopt -s nullglob
          inputs=(metrics-in/*.json)
          if [ ${#inputs[@]} -eq 0 ]; then
            echo "WARN: no metric artifacts found — emitting empty suites" >&2
            echo "[]" > build-size.json; echo "[]" > build-speed.json
          else
            python3 synth/to_gha_bench.py "${inputs[@]}" \
              --size-out build-size.json --speed-out build-speed.json
          fi
          ls -l build-size.json build-speed.json
      - name: Bootstrap prior history from the live site
        run: |
          set -euo pipefail
          base="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}"
          for kind in size speed; do
            url="$base/bench-$kind/benchmark-data.json"
            if curl -fsSL --head "$url" >/dev/null 2>&1; then
              curl -fsSL "$url" -o "site/bench-$kind/benchmark-data.json"
              echo "fetched prior $kind history"
            else
              : > "site/bench-$kind/benchmark-data.json"
              echo "no prior $kind history (first run)"
            fi
          done
      - name: Append size suite
        uses: benchmark-action/github-action-benchmark@v1
        continue-on-error: true
        with:
          name: synth-size
          tool: customSmallerIsBetter
          output-file-path: build-size.json
          external-data-json-path: site/bench-size/benchmark-data.json
          benchmark-data-dir-path: site/bench-size
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Append speed suite
        uses: benchmark-action/github-action-benchmark@v1
        continue-on-error: true
        with:
          name: synth-speed
          tool: customBiggerIsBetter
          output-file-path: build-speed.json
          external-data-json-path: site/bench-speed/benchmark-data.json
          benchmark-data-dir-path: site/bench-speed
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble site
        run: |
          set -euo pipefail
          for kind in size speed; do
            f="site/bench-$kind/benchmark-data.json"
            # If an Append step no-op'd (empty suite / comment 403 on a fork PR),
            # the data file may be empty. Substitute a valid empty history so the
            # generated data.js is always parseable JavaScript.
            if [ ! -s "$f" ]; then
              echo '{"lastUpdate":0,"repoUrl":"","entries":{}}' > "$f"
            fi
            echo "window.BENCHMARK_DATA = $(cat "$f")" > "site/bench-$kind/data.js"
          done
          cp dashboard/index.html dashboard/app.js site/
          mkdir -p site/fixtures && cp dashboard/fixtures/data.js site/fixtures/
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        if: github.event_name == 'push'
        uses: actions/deploy-pages@v4
