# VHDL Style Guide config for jcore-cpu. Default ruleset; project exceptions below.
# (populated as Phases B/C reveal rules that must be relaxed, each with a reason)
rule:
  # signal_007/variable_007: "remove default assignment" on signal/variable
  # declarations changes the initial/reset value seen by synthesis — not
  # cosmetic, so left alone.
  signal_007:
    disable: true
  variable_007:
    disable: true
  # port_012: "remove assignment" (default expression) on port declarations
  # changes behavior when a port is left unconnected at instantiation — not
  # cosmetic, so left alone.
  port_012:
    disable: true
  # process_016/018: add labels to (unlabeled) process/end-process statements.
  # vsg cannot auto-generate a label (no fixer), and hand-picking process
  # names is a naming exercise, not a mechanical reformat; left alone for a
  # separate, deliberate pass.
  process_016:
    disable: true
  process_018:
    disable: true
  # instantiation_034/036: would force direct-entity instantiations to the
  # named-component form. This is an elaboration/binding style choice already
  # established in this codebase, not purely cosmetic whitespace/case; left
  # alone rather than changed by an autofixer.
  instantiation_034:
    disable: true
  instantiation_036:
    disable: true
  # subprogram_body_205 (blank line after a subprogram body) conflicts with
  # entity_016 (no blank line before "end entity") when a function is the
  # last declaration before the entity's closing statement — mutually
  # exclusive on that boundary; entity_016 (no blank line) wins.
  subprogram_body_205:
    disable: true
  # element_association_100: enforce exactly 1 space between "others" and "=>".
  # Several reset-value aggregates (cache_pkg, cpusim_miniaic2, ...) deliberately
  # pad "(others   => '0')" so the "=>" tokens line up in a column with the
  # sibling associations of a nested aggregate — a readability choice, purely
  # cosmetic, that vsg --fix does not reconcile. Left aligned rather than
  # collapsed to a single space.
  element_association_100:
    disable: true
  # library_007 ("remove blank lines" around a use clause) conflicts with
  # package_011 ("insert blank line below the package declaration") when a
  # use clause is the first item inside a package (sim/bridge_pkg.vhd):
  # package_011's fixer adds the blank line that library_007 then rejects —
  # mutually exclusive on that boundary. package_011 (blank line) wins.
  library_007:
    disable: true
  # length_001: 120-char line-length limit. A handful of hand-written lines
  # exceed it AFTER vsg's own reformat — long descriptive trailing comments and
  # long constant/type expressions (e.g. cache_pkg cache_mem_words / cache tag
  # slice) whose declaration is padded by the block's constant_400 ":="
  # alignment. Wrapping the value only moves the overflow onto the continuation
  # line (constant_014/variable_400 force it back out to the aligned column), so
  # the rule is mutually exclusive with the alignment rules on these lines —
  # a necessary violation. Left as-is (warning) rather than fought.
  length_001:
    disable: true
