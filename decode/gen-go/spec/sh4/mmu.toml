# SH-4 MMU control-register LDC/STC (J4 overlay, MMU_ARCH). PT-register family:
#   LDC = 0100 mmmm xxxx 1110 ; STC = 0000 nnnn xxxx 0011
#   xxxx: 0101 PTEH · 0110 PTEL · 0111 ASIDR. All privileged.
# These are additive overlay entries: absent from the base J2 decoder, so
# they raise General Illegal on J2. See spec §5.

[[instr]]
  name = "LDC Rm, PTEH"
  privileged = true
  format = "m"
  opcode = "0100 mmmm 0101 1110"
  operation = "Rm -> PTEH (MMU page-table-entry high)"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "Rm"
    zbus = "PTEH"
    zbus_sel = "Y"

[[instr]]
  name = "STC PTEH, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0101 0011"
  operation = "PTEH -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "PTEH"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "LDC Rm, PTEL"
  privileged = true
  format = "m"
  opcode = "0100 mmmm 0110 1110"
  operation = "Rm -> PTEL (MMU page-table-entry low)"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "Rm"
    zbus = "PTEL"
    zbus_sel = "Y"

[[instr]]
  name = "STC PTEL, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0110 0011"
  operation = "PTEL -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "PTEL"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "LDC Rm, ASIDR"
  privileged = true
  format = "m"
  opcode = "0100 mmmm 0111 1110"
  operation = "Rm -> ASIDR (address space identifier)"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "Rm"
    zbus = "ASIDR"
    zbus_sel = "Y"

[[instr]]
  name = "STC ASIDR, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0111 0011"
  operation = "ASIDR -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "ASIDR"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "LDTLB"
  privileged = true
  opcode = "0000 0000 0011 1000"
  operation = "PTEH/PTEL/ASIDR -> TLB"
  [[instr.slots]]
    tlb_wr = "YES"
    mask_int = "YES"
    pc = "INC"

# ---- LDTLB.R: fused Load-TLB-and-Return (hardware-spec.md §3.2) ----
# Equivalent to LDTLB immediately followed by RTE, but atomic: latch
# {PTEH, PTEL, ASIDR} into a TLB entry AND restore PC<-SPC, SR<-SSR and take
# the delayed branch. The three return slots are identical to RTE (see
# spec/sh4/exceptions.toml); slot 0 additionally pulses the TLB write port
# (tlb_wr) so the install commits in the same atomic sequence as the return.
# Both LDTLB (0x0038, install only) and LDTLB.R (0x0068) are required.
[[instr]]
  name = "LDTLB.R"
  privileged = true
  format = "0"
  opcode = "0000 0000 0110 1000"
  operation = "PTEH/PTEL/ASIDR -> TLB; SR<-SSR, PC<-SPC (delayed branch)"

  [[instr.slots]]
    tlb_wr = "YES"
    pc = "INC"
    ybus = "SSR"
    zbus_sel = "Y"
    sr = "Z"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SPC"
    zbus_sel = "Y"
    zbus = "PC"
  [[instr.slots]]
    pc = "HOLD"
    delay_jmp = "SET"
    if_addy = "ZBUS"

# ---- Break / Reset CPU: bit-11 pin (J4+MMU_ARCH overlay only) ----
# The base spec uses don't-care bit 11 (---- -010 / ---- -011). That is correct
# for J1/J2/J4 without MMU, because no TLB exception opcodes exist to alias with.
# With MMU_ARCH, nibbles 0xA (TLB DMISS_W) and 0xB (TLB IPROT) occupy bit 11 = 1
# in the system plane. A don't-care bit 11 in Break ("-010") aliases nibble 0xA,
# causing a D-store TLB miss to assert `debug` and stall the CPU. Similarly
# "-011" aliases nibble 0xB (IPROT). Pinning bit 11 = 0 here, in the overlay only,
# avoids perturbing the base decoder logic minimizer (which would regress J2 ASIC
# Fmax by ~14% if pinned in the base spec). Same aliasing class fixed for
# Interrupt/Error/Slot Illegal/General Illegal in spec/sh4/exceptions.toml.

[[instr]]
  name = "Break"
  format = ""
  opcode = "---- 0010 dddd dddd"
  operation = ""
  plane = "system"

  [[instr.slots]]
    pc = "HOLD"

  [[instr.slots]]
    alu_y = "2"
    arith = "SUB"
    debug = "YES"
    pc = "HOLD"
    xbus = "PC"
    zbus = "PC"
    zbus_sel = "ARITH"

  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"

  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"

[[instr]]
  name = "Reset CPU"
  format = "d8"
  opcode = "---- 0011 dddd dddd"
  operation = ""
  plane = "system"

  [[instr.slots]]
    pc = "HOLD"

  [[instr.slots]]
    event = "ack"
    pc = "HOLD"

  [[instr.slots]]
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "32"
    pc = "HOLD"
    ybus = "U*4"
    zbus = "TEMP0"
    zbus_sel = "Y"

  [[instr.slots]]
    alu_y = "4"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "32"
    pc = "HOLD"
    wbus = "R15"
    xbus = "TEMP0"
    zbus_sel = "ARITH"

  [[instr.slots]]
    pc = "HOLD"
    zbus = "PC"
    zbus_sel = "W"

  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    logic = "XOR"
    pc = "HOLD"
    xbus = "TEMP1"
    ybus = "TEMP1"
    zbus = "VBR"
    zbus_sel = "LOGIC"

  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"

  [[instr.slots]]
