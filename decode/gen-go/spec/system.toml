# Base-stack-model external page-fault exceptions (PAGE_FAULT_ARCH). Dispatched
# from decode_core's texc_req hold when page_fault_i drives the internal
# tlb_exc_* signals (see cpu.vhd g_no_mmu). Structurally identical to General
# Illegal (push SR/PC to @-R15, indirect-vector through VBR+U*4, U=d8=0 -> VBR+0);
# they differ ONLY in slot 0's restart-PC source. No MMU/PRIV state (no SPC/SSR,
# no SR banking). Page Fault I restarts at PC-2 (the faulting fetch); Page Fault D
# restarts at the datapath-latched faulting-instruction PC (TLBPC), because a
# data access resolves after the fetch PC has run a variable distance ahead.
