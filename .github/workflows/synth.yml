name: synth

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  synth-check:
    runs-on: ubuntu-latest
    # ghdl/synth:beta bundles a from-source GHDL with the --synth backend
    # (and yosys + ghdl-yosys-plugin). The apt `ghdl` package is too old to
    # reliably reproduce the ill-formed-clock rejection, so use this image.
    container: ghdl/synth:beta
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4

      - name: Checkout jcore-soc (TOOLS_DIR / v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc

      - name: Tool versions
        run: |
          ghdl --version | head -3
          perl --version | head -2

      - name: Run synthesis gate
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: ./tools/synth-check.sh

  tag-release:
    needs: synth-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for conventional-commit analysis

      # Derive the next SemVer from conventional-commit messages since the
      # last tag: feat -> minor; fix/perf/refactor/test -> patch; a `!` or
      # BREAKING CHANGE -> major (ietf-tools/semver-action defaults).
      #   skipInvalidTags     : ignore the repo's non-SemVer milestone tags
      #                         (e.g. gen-go-m4-complete).
      #   noVersionBumpBehavior: patch — a push with no bumping commit still
      #                          cuts a patch release (keeps a tag per green master).
      #   noNewCommitBehavior : warn — re-runs with no new commits are a no-op
      #                         (next == current; the tag step below is skipped).
      # ONE-TIME SEED: fallbackTag must already exist, so create the initial
      # tag once by hand before this job can run:
      #     git tag -a v1.0.0 <seed-commit> -m "v1.0.0" && git push origin v1.0.0
      - name: Compute next version (conventional commits)
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: master
          skipInvalidTags: true
          noNewCommitBehavior: warn
          noVersionBumpBehavior: patch
          fallbackTag: v1.0.0

      - name: Create and push tag
        if: steps.semver.outputs.next != steps.semver.outputs.current
        env:
          NEXT: ${{ steps.semver.outputs.next }}
        run: |
          set -euo pipefail
          echo "current=${{ steps.semver.outputs.current }} next=$NEXT bump=${{ steps.semver.outputs.bump }}"
          git tag -a "$NEXT" -m "Release $NEXT (synth gate green on master)"
          git push origin "$NEXT"
