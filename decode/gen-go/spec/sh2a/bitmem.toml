  [[instr.slots]]
    pc = "HOLD"
  [[instr.slots]]
    pc = "HOLD"
  [[instr.slots]]                 # slot9: extract bit imm3 of TEMP0 -> T (NO store)
    logic = "AND"
    xbus = "TEMP0"
    ybus = "MASK3_64"
    logic_sr = "NOT_ZERO"
    sr = "LOGIC"
    pc = "HOLD"
  [[instr.slots]]                 # slot10-11: filler (align with RMW ops' timing)
    pc = "HOLD"
  [[instr.slots]]
    pc = "HOLD"
  [[instr.slots]]                 # slot12: NO store -- just terminal dispatch.
    pc = "INC"                    # pc=INC + auto if_issue+dispatch: the SECOND
                                   # word's PC-advance/fetch happens HERE, adjacent
                                   # to dispatch (same timing as the RMW ops), but
                                   # bld/bldnot do not write memory at all.

[[instr]]
  name = "BLDNOT.B #imm3,@(disp12,Rn)"
  format = "nd12i3"
  opcode = "0011 nnnn 0iii 1001"
  opcode2 = "1011 dddd dddd dddd"
  operation = "NOT bit imm3 of (disp12 + Rn) -> T"
  table_ref = "SH-2A"

  [[instr.slots]]                 # slot0: latch ext word (INC #1 - consumes word1)
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"
  [[instr.slots]]                 # slot1: EA = Rn + disp12 -> TEMP1. imm_from_ext
    imm_from_ext = "1"            # reads word2 combinationally off if_dr (no
    alu_y = "U*1"                 # if_issue needed to consume it), and pc=HOLD:
    arith = "ADD"                 # the SECOND PC-advance/fetch is deferred to the
    xbus = "Rn"                   # terminal so it sits ADJACENT to dispatch (the
    zbus = "TEMP1"                # movi20 pattern). A fetch-advance here, far from
