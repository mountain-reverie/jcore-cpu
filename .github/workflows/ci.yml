name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # ghdl --synth legality gate. Needs only GHDL; ghdl/setup-ghdl is a
  # lightweight, cached install. `nightly` is recent enough to reject the
  # ill-formed-clock idiom (the apt package is too old).
  legality:
    name: ghdl --synth (legality)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (TOOLS_DIR / v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Setup GHDL
        uses: ghdl/setup-ghdl@v1.4.0
        with:
          version: nightly
          backend: mcode
      - name: Legality gate
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: ./tools/synth-check.sh --legality

  # ECP5 technology-mapping gate (yosys synth_ecp5). Needs yosys + the ghdl
  # plugin; the oss-cad-suite bundles both (plus nextpnr) in one cached tarball.
  ecp5-map:
    name: synth_ecp5 (ECP5 mapping)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (TOOLS_DIR / v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Setup oss-cad-suite (ghdl + yosys + ghdl plugin)
        uses: YosysHQ/setup-oss-cad-suite@v4
      - name: ECP5 mapping gate
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: ./tools/synth-check.sh --ecp5

  # Test-ROM simulation: LED-sequence check for the direct and ROM decoders.
  # Uses the committed sim/ram.img, so no sh2-elf-gcc is needed. (The
  # interrupts/rte sim tests, which need sh2-elf-gcc, run in the heavy-image
  # full-regression instead.)
  rom-tests:
    name: testrom LED checks (direct + ROM decoder)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (TOOLS_DIR / v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Setup GHDL
        uses: ghdl/setup-ghdl@v1.4.0
        with:
          version: nightly
          backend: mcode
      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc make
      - name: ROM tests
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: ./tools/rom-tests.sh

  # On a green master push, tag the next SemVer from conventional-commit
  # history. ietf-tools/semver-action: feat -> minor, fix/perf/refactor/test
  # -> patch, breaking -> major. The tag is created in-repo with the
  # workflow's own GITHUB_TOKEN — no PAT.
  #   skipInvalidTags     : ignore the repo's non-SemVer milestone tags.
  #   noVersionBumpBehavior: patch — a no-bump push still cuts a patch.
  #   noNewCommitBehavior : warn — no-new-commit re-runs are a no-op (guarded
  #                         below by next != current).
  # ONE-TIME SEED: fallbackTag must already exist, so create the first tag by
  # hand once: git tag -a v1.0.0 <seed-commit> -m "v1.0.0" && git push origin v1.0.0
  tag-release:
    name: tag release
    needs: [legality, ecp5-map, rom-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for conventional-commit analysis
      - name: Compute next version (conventional commits)
        id: semver
        uses: ietf-tools/semver-action@v1.11.0
        with:
          token: ${{ github.token }}
          branch: master
          skipInvalidTags: true
          noNewCommitBehavior: warn
          noVersionBumpBehavior: patch
          fallbackTag: v1.0.0
      - name: Create and push tag
        if: steps.semver.outputs.next != steps.semver.outputs.current
        env:
          NEXT: ${{ steps.semver.outputs.next }}
        run: |
          set -euo pipefail
          echo "current=${{ steps.semver.outputs.current }} next=$NEXT bump=${{ steps.semver.outputs.bump }}"
          git tag -a "$NEXT" -m "Release $NEXT (CI green on master)"
          git push origin "$NEXT"
