<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>jcore-cpu — ASIC P&R (post-route) trends</title>

  </style>
</head>
<body>
  <h1>ASIC place-and-route (post-route) trends</h1>
  <p class="muted"><a href="../">&larr; back to synthesis metrics</a> ·

  <div id="trends" class="grid"></div>
  <p id="empty" class="muted" hidden>No P&amp;R data yet — the daily run has not produced metrics.</p>
  <script src="./data.js" onerror="document.getElementById('empty').hidden=false"></script>
  <script src="./app.js"></script>
