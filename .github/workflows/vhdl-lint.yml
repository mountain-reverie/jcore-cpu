name: vhdl-lint
# VSG (VHDL Style Guide) lint, report-only. Surfaces the formatting backlog
# (Phases B/C reformat hand-written .vhd and .vhm sources) without gating
# the build yet. VSG is slow (~minutes across the in-scope file set), so
# this job has a generous timeout and always exits 0.

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  vhdl-lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4

      - name: Checkout jcore-soc (tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: mountain-reverie/jcore-soc
          path: jcore-soc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VSG
        run: pip install -r requirements-dev.txt

      - name: Run vhdl-lint (report-only)
        id: lint
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
          JCORE_SOC: ${{ github.workspace }}/jcore-soc
        run: |
          set +e
          scripts/vhdl-lint.sh 2>&1 | tee /tmp/vhdl-lint.log
          status=${PIPESTATUS[0]}
          total=$(grep -oE 'Total violations: [0-9]+' /tmp/vhdl-lint.log | tail -1 | grep -oE '[0-9]+')
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"
          echo "vsg_status=${status}" >> "$GITHUB_OUTPUT"
          true   # report-only: never fail this job on VSG findings

      - name: Step summary
        if: always()
        run: |
          {
            echo "### VSG lint (report-only)"
            echo "- Total violations: ${{ steps.lint.outputs.total }}"
            echo "- VSG exit status (informational, not gating): ${{ steps.lint.outputs.vsg_status }}"
            echo ""
            echo "This job is report-only (Task A). It does not gate CI; reformatting"
            echo "lands in later phases (Phase B: hand-written .vhd, Phase C: .vhm)."
          } >> "$GITHUB_STEP_SUMMARY"
