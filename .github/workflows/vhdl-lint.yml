name: vhdl-lint
# VSG (VHDL Style Guide) gate over the hand-written .vhd. Fails the job on any
# violation. Scope (scripts/vhdl-lint.sh): excludes the Go-generated decode
# files, the v2p-generated .vhm-derived .vhd (external tool's output style is
# not controllable from this repo), and the generator golden/static fixtures
# (byte-compared by go tests). VSG is slow (~minutes over ~82 files) -> generous
# timeout.

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  vhdl-lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VSG
        run: pip install -r requirements-dev.txt

      - name: Run vhdl-lint (gating)
        run: scripts/vhdl-lint.sh
