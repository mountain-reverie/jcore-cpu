# SH-4 register-model exception entry/return (J4 overlay; overrides the base
# SH-2 stack-model instructions by name). SPC = regfile 21, SSR = regfile 22.
# See docs/priv-arch/j4-implementation-design.md §4 and
# docs/priv-arch/pm3-fixed-vectors-expevt-design.md.
#
# Entry: SPC <- PC(-adjust) in one slot (zbus=SPC, zbus_sel=ARITH), then
# SSR<-SR + SEL_EXCEPTION, then a DIRECT fixed-vector jump
# PC <- VBR+0x100 (general exceptions) or VBR+0x600 (interrupt). No vector-table
# memory read (the SH-4 model: handler code lives at the fixed offset), and no
# stack pushes. ALL six entries use the register model so the register-model RTE
# returns correctly. Tested: TRAPA (trapatest/exctest), General Illegal
# (privmode); others are structurally identical.

# ---- Interrupt (maskable: capture level, set IMASK) ----
[[instr]]
  name = "Interrupt"
  format = "d8"
  opcode = "---- -000 dddd dddd"
  operation = "SPC<-PC; SSR<-SR; MD/RB/BL; IMASK; PC<-VBR+0x600"
  plane = "system"

  [[instr.slots]]
    event = "ack"
    ilevel_capture = "Y"
    alu_y = "2"
    arith = "SUB"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]
    pc = "HOLD"
    sr = "INT_MASK"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "1536"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- Error (event-driven; no IMASK) ----
[[instr]]
  name = "Error"
  format = "d8"
  opcode = "---- -001 dddd dddd"
  operation = "SPC<-PC; SSR<-SR; MD/RB/BL; PC<-VBR+0x100"
  plane = "system"

  [[instr.slots]]
    event = "ack"
    alu_y = "2"
    arith = "SUB"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "256"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- Slot Illegal ----
[[instr]]
  name = "Slot Illegal"
  format = "d8"
  opcode = "---- -110 dddd dddd"
  operation = "SPC<-PC; SSR<-SR; MD/RB/BL; PC<-VBR+0x100"
  plane = "system"

  [[instr.slots]]
    alu_y = "0"
    arith = "ADD"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "256"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- General Illegal (restart = faulting instruction, PC-2) ----
[[instr]]
  name = "General Illegal"
  format = "d8"
  opcode = "---- -111 dddd dddd"
  operation = "SPC<-PC-2; SSR<-SR; MD/RB/BL; PC<-VBR+0x100"
  plane = "system"

  [[instr.slots]]
    alu_y = "2"
    arith = "SUB"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "256"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- TRAPA #imm (SPC = next instruction; all imm vector to VBR+0x100; the
#      handler reads TRA (Phase B) to recover imm) ----
[[instr]]
  name = "TRAPA #imm"
  format = "i8"
  opcode = "1100 0011 iiii iiii"
  operation = "SPC<-PC; SSR<-SR; MD/RB/BL; PC<-VBR+0x100"

  [[instr.slots]]
    alu_y = "0"
    arith = "ADD"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "256"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- RTE: SR <- SSR, PC <- SPC (delayed branch) ----
[[instr]]
  name = "RTE"
  privileged = true
  format = "0"
  opcode = "0000 0000 0010 1011"
  operation = "Delayed branch: SR<-SSR, PC<-SPC"
  table_ref = "A.23"

  [[instr.slots]]
    pc = "INC"
    ybus = "SSR"
    zbus_sel = "Y"
    sr = "Z"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SPC"
    zbus_sel = "Y"
    delay_jmp = "SET"
    if_addy = "ZBUS"
  [[instr.slots]]
    pc = "HOLD"

# ---- Privileged software access to SSR/SPC (design §5 Tier-1) ----
[[instr]]
  name = "STC SSR, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0011 0010"
  operation = "SSR -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "SSR"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "STC SPC, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0100 0010"
  operation = "SPC -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "SPC"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "LDC Rm, SSR"
  privileged = true
  format = "m"
  opcode = "0100 mmmm 0011 1110"
  operation = "Rm -> SSR"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "Rm"
    zbus = "SSR"
    zbus_sel = "Y"

[[instr]]
  name = "LDC Rm, SPC"
  privileged = true
  format = "m"
  opcode = "0100 mmmm 0100 1110"
  operation = "Rm -> SPC"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "Rm"
    zbus = "SPC"
    zbus_sel = "Y"
