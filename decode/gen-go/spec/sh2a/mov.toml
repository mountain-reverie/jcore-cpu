# SH-2A overlay: MOV instruction extensions.
# Defaults mirror spec/mov.toml.

[defaults]
  pc = "INC"
  if_issue = "NO"
  sr = "HOLD"

[[instr]]
  name = "MOV.L @(disp12,Rm),Rn"
  format = "nmd12"
  opcode = "0011 nnnn mmmm 0001"
  opcode2 = "0110 dddd dddd dddd"
  operation = "(disp12 × 4 + Rm) ? Rn"
  table_ref = "SH-2A"

  # slot0: latch the second opcode word (the disp12 extension word) into
  # hardware; nothing else happens this cycle. This slot consumes one
  # 16-bit word of the instruction stream (the opcode word itself), so it
  # must also pulse if_issue to advance the fetch-ahead buffer by one word
  # -- otherwise the buffer ends up one word "behind" the two pc=INC pulses
  # issued across this instruction's two slots, and the slot1 if_issue
  # (auto-injected because it is the last slot) ends up committing the
  # *extension* word itself as if it were the next instruction, instead of
  # the real instruction that follows it. (Root cause of the U-address
  # bus-exception hang in sh2a_movl12: xbus/ma read a spurious decode of
  # the disp12 extension word.) if_issue alone (no dispatch) just commits
  # the fetch-ahead buffer without ending the instruction.
  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"

  # slot1: exactly the single-word "MOV.L @(disp, Rm), Rn" slot (same
  # ma_*/bus fields, same wbus="Rn" writeback), plus imm_from_ext so the
  # ALU-Y immediate (disp12*4, IMM_U_12_2) is sourced from the latched
  # extension word instead of op.code.
  [[instr.slots]]
    imm_from_ext = "1"
    alu_y = "U*4"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "32"
    pc = "INC"
    wbus = "Rn"
    xbus = "Rm"
    zbus_sel = "ARITH"

  [[instr.slots]]

# SH-2A MOV.L Rm,@(disp12,Rn) -- store counterpart of the load above. Shares
# word1 "0011 nnnn mmmm 0001" with MOV.L @(disp12,Rm),Rn; the two are
# distinguished ONLY by the extension word's high nibble (ext_word[15:12]):
# load = 0110, store = 0010. This is the first two-word instruction pair in
# the spec that collides on word1, proving the generator's ext_word[15:12]
# discrimination (internal/model + all three decode_table emit templates).
[[instr]]
  name = "MOV.L Rm,@(disp12,Rn)"
  format = "nmd12"
  opcode = "0011 nnnn mmmm 0001"
  opcode2 = "0010 dddd dddd dddd"
  operation = "Rm -> (disp12*4 + Rn)"
  table_ref = "SH-2A"

  # slot0: latch ext word (identical to mov.l load's slot0).
  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"

  # slot1: store Rm @ Rn + disp12*4.
  [[instr.slots]]
    imm_from_ext = "1"
    alu_y = "U*4"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_data = "YBUS"
    ma_op = "WRITE"
    ma_size = "32"
    pc = "INC"
    xbus = "Rn"
    ybus = "Rm"
    zbus_sel = "ARITH"

  [[instr.slots]]

# SH-2A MOV.B @(disp12,Rm),Rn / MOV.W @(disp12,Rm),Rn -- byte/word load
# counterparts of MOV.L @(disp12,Rm),Rn above. Same word1 discrimination
# ("0011 nnnn mmmm 0001"), distinguished by ext_word[15:12] (byte=0100,
# word=0101). Sign-extension on load happens for free via the existing
# align_read_data datapath function (no datapath change needed); the
# unsigned displacement scale differs per size (disp12*1 for byte,
# disp12*2 for word) via IMM_U_12_0 / IMM_U_12_1.
[[instr]]
  name = "MOV.B @(disp12,Rm),Rn"
  format = "nmd12"
  opcode = "0011 nnnn mmmm 0001"
  opcode2 = "0100 dddd dddd dddd"
  operation = "(disp12 + Rm) -> sign_extend(byte) -> Rn"
  table_ref = "SH-2A"

  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"

  [[instr.slots]]
    imm_from_ext = "1"
    alu_y = "U*1"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "8"
    pc = "INC"
    wbus = "Rn"
    xbus = "Rm"
    zbus_sel = "ARITH"

  [[instr.slots]]

[[instr]]
  name = "MOV.W @(disp12,Rm),Rn"
  format = "nmd12"
  opcode = "0011 nnnn mmmm 0001"
  opcode2 = "0101 dddd dddd dddd"
  operation = "(disp12*2 + Rm) -> sign_extend(word) -> Rn"
  table_ref = "SH-2A"

  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"

  [[instr.slots]]
    imm_from_ext = "1"
    alu_y = "U*2"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "16"
    pc = "INC"
    wbus = "Rn"
    xbus = "Rm"
    zbus_sel = "ARITH"

  [[instr.slots]]

# SH-2A MOVU.B @(disp12,Rm),Rn / MOVU.W @(disp12,Rm),Rn -- unsigned (zero-
# extending) byte/word load counterparts of MOV.B/MOV.W @(disp12,Rm),Rn
# above. Same word1 discrimination ("0011 nnnn mmmm 0001"), distinguished
# by ext_word[15:12] (ubyte=1000, uword=1001). Zero-extension on load uses
# the new UBYTE/UWORD mem_size_t values (core/components_pkg.vhd), handled
# by the UBYTE/UWORD arms added to align_read_data in core/datapath.vhm.
[[instr]]
  name = "MOVU.B @(disp12,Rm),Rn"
  format = "nmd12"
  opcode = "0011 nnnn mmmm 0001"
  opcode2 = "1000 dddd dddd dddd"
  operation = "(disp12 + Rm) -> zero_extend(byte) -> Rn"
  table_ref = "SH-2A"

  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"

  [[instr.slots]]
    imm_from_ext = "1"
    alu_y = "U*1"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "UBYTE"
    pc = "INC"
    wbus = "Rn"
    xbus = "Rm"
    zbus_sel = "ARITH"

  [[instr.slots]]

[[instr]]
  name = "MOVU.W @(disp12,Rm),Rn"
  format = "nmd12"
  opcode = "0011 nnnn mmmm 0001"
  opcode2 = "1001 dddd dddd dddd"
  operation = "(disp12*2 + Rm) -> zero_extend(word) -> Rn"
  table_ref = "SH-2A"

  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"

  [[instr.slots]]
    imm_from_ext = "1"
    alu_y = "U*2"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "UWORD"
    pc = "INC"
    wbus = "Rn"
    xbus = "Rm"
    zbus_sel = "ARITH"

  [[instr.slots]]

# SH-2A MOV.B Rm,@(disp12,Rn) / MOV.W Rm,@(disp12,Rn) -- byte/word store
# counterparts of MOV.L Rm,@(disp12,Rn) above. Same discrimination scheme;
# ext_word[15:12]: byte=0000, word=0001.
[[instr]]
  name = "MOV.B Rm,@(disp12,Rn)"
  format = "nmd12"
  opcode = "0011 nnnn mmmm 0001"
  opcode2 = "0000 dddd dddd dddd"
  operation = "Rm -> (disp12 + Rn)"
  table_ref = "SH-2A"

  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"

  [[instr.slots]]
    imm_from_ext = "1"
    alu_y = "U*1"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_data = "YBUS"
    ma_op = "WRITE"
    ma_size = "8"
    pc = "INC"
    xbus = "Rn"
    ybus = "Rm"
    zbus_sel = "ARITH"

  [[instr.slots]]

[[instr]]
  name = "MOV.W Rm,@(disp12,Rn)"
  format = "nmd12"
  opcode = "0011 nnnn mmmm 0001"
  opcode2 = "0001 dddd dddd dddd"
  operation = "Rm -> (disp12*2 + Rn)"
  table_ref = "SH-2A"

  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"

  [[instr.slots]]
    imm_from_ext = "1"
    alu_y = "U*2"
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_data = "YBUS"
    ma_op = "WRITE"
    ma_size = "16"
    pc = "INC"
    xbus = "Rn"
    ybus = "Rm"
    zbus_sel = "ARITH"

  [[instr.slots]]

# SH-2A MOVML.L Rm,@-R15 : push R0..Rm (m+1 longs) onto the R15 stack, Rm at
# the highest address, R0 at the lowest. This is ONE store microcode slot;
# the repetition is driven ENTIRELY in decode_core.vhm (SH2A_ARCH-gated), which
# detects the movml opcode (0100 mmmm 1111 0001), HOLDS op.addr and re-presents
# these slots while overriding op.code(11:8) with a running index.
#
# Restart-safe design (docs/superpowers/specs/2026-07-09-j2a-restart-safe-
# push-design.md §1/§2): a scratch pointer push_ptr = R15-4*(m+1) (the
# post-push SP) is held CONSTANT across the store loop -- R15 itself is
# NEVER written mid-instruction -- so a mid-store memory fault + restart
# re-derives push_ptr from the still-pristine R15 and re-stores idempotently.
# push_ptr lives in the datapath (core/components_pkg.vhd) and is captured/
# consumed via SH2A_ARCH-gated signature classification in core/datapath.vhm
# (NO generator change, NO new control field/enum -- see the design doc §3
# and §5 for the collision analysis / byte-identity argument). THREE slots:
#
#   slot0 (init, once): push_ptr := R15-(m+1)*4. xbus=R15, alu_y=UH*4 with
#     decode_core driving op.code(11:8):=m+1 -> (m+1)*4, arith=SUB, no mem
#     access, no zbus write (wr_z=0) so pc HELD. The datapath's init
#     classifier captures the ALU result into push_ptr (the SUB direction +
#     no-mem + no-commit combination is what distinguishes it from slot2).
#   slot1 (store loop, repeated m+1x for idx=0..m): store R(idx) @
#     push_ptr+idx*4. alu_y=UH*4 with op.code(11:8):=idx (the SAME field
#     that also selects ybus=Rn=R(idx), the coincidence that made the
#     restart-safe pop clean too), arith=ADD, ma_op=WRITE, no zbus write, pc
#     HELD. The datapath's store classifier (WRITE direction) substitutes
#     push_ptr for the xbus address base; the spec-level xbus="R15" here is
#     a don't-care placeholder (always overridden).
#   slot2 (terminal, once): R15 := R15-(m+1)*4, RECOMPUTED from the still-
#     pristine R15 (NOT read from push_ptr -- this is the same computation
#     as slot0 but with zbus=R15/wr_z=1, which is exactly what keeps it out
#     of both signature classifiers). xbus=R15, alu_y=UH*4 with
#     op.code(11:8):=m+1, arith=SUB, zbus=R15, pc=INC (the only PC advance
#     for the whole instruction).
[[instr]]
  name = "MOVML.L Rm,@-R15"
  format = "n"
  opcode = "0100 nnnn 1111 0001"
  operation = "R15-4*(m+1)->R15, R(m..0)->(R15..)"
  table_ref = "SH-2A"

  # slot0 -- init (once): push_ptr := R15-(m+1)*4. decode_core drives
  # op.code(11:8):=m+1. No zbus write -> the datapath init classifier
  # captures the ALU result into push_ptr instead of dropping it.
  [[instr.slots]]
    alu_y = "UH*4"      # IMM_U_H4_2 = op.code(11:8) << 2 = (m+1)*4
    arith = "SUB"
    pc = "HOLD"
    xbus = "R15"
    zbus_sel = "ARITH"

  # slot1 -- store loop (repeated m+1x by decode_core, idx = 0..m): store
  # R(idx) @ push_ptr+idx*4. xbus="R15" is a don't-care placeholder; the
  # datapath store classifier substitutes push_ptr as the address base.
  [[instr.slots]]
    alu_y = "UH*4"      # IMM_U_H4_2 = op.code(11:8) << 2 = idx*4
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_data = "YBUS"
    ma_op = "WRITE"
    ma_size = "32"
    pc = "HOLD"
    xbus = "R15"
    ybus = "Rn"
    zbus_sel = "ARITH"

  # slot2 -- terminal (once): R15 := R15-(m+1)*4, recomputed from the
  # still-pristine R15 (NOT read from push_ptr). decode_core drives
  # op.code(11:8):=m+1. zbus=R15 (wr_z=1) is what keeps this OUT of both
  # push_ptr signature classifiers.
  [[instr.slots]]
    alu_y = "UH*4"      # IMM_U_H4_2 = op.code(11:8) << 2 = (m+1)*4
    arith = "SUB"
    pc = "INC"
    xbus = "R15"
    zbus = "R15"
    zbus_sel = "ARITH"

# SH-2A MOVML.L @R15+,Rn (pop, n+1 longs). TWO microcode slots; the n+1
# repetition of slot0 is driven in decode_core.vhm (SH2A_ARCH), the same
# substrate as the push but counting the index UP 0..n, followed by ONE
# terminal slot1 that updates R15.
#
# Restart-safe indexed-load design (see docs/superpowers/specs/
# 2026-07-09-j2a-group4-movml-pop-design.md §2/§3). The register file has a
# single physical write-commit port: if a slot writes both R15 (Z-bus) and
# R(idx) (W-bus) in the same cycle the Z-write wins and the loaded data is
# silently dropped ("Write clash"). So each per-element load writes ONLY the
# W-port (no zbus GPR write); R15 is left pristine through the whole loop and
# advanced EXACTLY ONCE in the terminal slot -- which also makes a mid-load
# memory-fault restart idempotent (re-reads the same addresses from the
# unchanged R15).
#
#   slot0 (repeated by the loop for idx = 0..n): address = R15 + idx*4
#     (alu_y="UH*4"/IMM_U_H4_2 = op.code(11:8)<<2, op.code(11:8)=idx overridden
#     by decode_core), loaded data -> R(idx) (wbus=Rn, same op.code(11:8)=idx).
#     W-port only. (disp rides op.code(11:8), NOT op.code(3:0), which is the
#     fixed "0101" opcode discriminant -- see the format comment below.)
#   slot1 (terminal, once): R15 := R15 + (n+1)*4. disp=(n+1) supplied by
#     decode_core on op.code(11:8). Z-port only -> no clash.
[[instr]]
  name = "MOVML.L @R15+,Rn"
  # format "n": Rn = op.code(11:8) (the wbus dest = the loaded register). The
  # per-element displacement also rides in op.code(11:8) via alu_y="UH*4"
  # (IMM_U_H4_2 = op.code(11:8) << 2), NOT op.code(3:0): decode_core overrides
  # op.code(11:8) with the running index, and op.code(3:0)="0101" is a fixed
  # opcode discriminant (vs push "0001") that must NOT be repurposed -- the
  # simple/direct decoders re-match the full opcode every cycle.
  format = "n"
  opcode = "0100 nnnn 1111 0101"
  operation = "R15->R(0..n), R15+4*(n+1)->R15"
  table_ref = "SH-2A"

  # slot0 -- indexed load, repeated by the decode_core loop for idx = 0..n.
  # address = R15 + idx*4; loaded data -> R(idx). W-port write ONLY (no zbus
  # GPR write) -> no register-file write-commit clash.
  [[instr.slots]]
    alu_y = "UH*4"      # IMM_U_H4_2 = op.code(11:8) << 2 = idx*4
    arith = "ADD"
    ma_addy = "ZBUS"    # address = R15 + idx*4
    ma_op = "READ"
    ma_size = "32"
    pc = "HOLD"         # PC does not advance until the terminal slot
    wbus = "Rn"         # loaded data -> R(op.code[11:8]) = R(idx)  (W-port)
    xbus = "R15"
    zbus_sel = "ARITH"

  # slot1 -- terminal, runs ONCE after the loop. R15 := R15 + (n+1)*4. Z-port
  # only -> no clash. decode_core drives op.code(11:8) := (n+1) for this slot.
  [[instr.slots]]
    alu_y = "UH*4"      # IMM_U_H4_2 = op.code(11:8) << 2 = (n+1)*4
    arith = "ADD"
    pc = "INC"
    xbus = "R15"
    zbus = "R15"        # R15 writeback (Z-port)
    zbus_sel = "ARITH"

# SH-2A MOVMU.L Rm,@-R15 : push PR and R0..Rm. PR at the highest address (stored
# first), then Rm..R0 descending; R15 -= 4*(m+2). Incremental-R15 (matches movml
# push; NOT restart-safe, by design). TWO slots: slot0 stores PR once, slot1 is
# the movml register-store loop (decode_core re-presents it m+1x, op.code(11:8)
# override m..0). See docs/superpowers/specs/2026-07-09-j2a-movmu-design.md.
[[instr]]
  name = "MOVMU.L Rm,@-R15"
  format = "n"
  opcode = "0100 nnnn 1111 0000"
  operation = "R15-4*(m+2)->R15, PR->(top), R(m..0)->(...)"
  table_ref = "SH-2A"

  # slot0 (once): PR store at R15-4 (highest), R15 := R15-4. ybus=PR (as STS.L PR).
  [[instr.slots]]
    alu_y = "4"
    arith = "SUB"
    ma_addy = "ZBUS"
    ma_data = "YBUS"
    ma_op = "WRITE"
    ma_size = "32"
    pc = "HOLD"
    xbus = "R15"
    ybus = "PR"
    zbus = "R15"
    zbus_sel = "ARITH"

  # slot1 (looped m+1x by decode_core): register store, R(idx) at R15-4, R15 -= 4.
  # Identical to the movml push store slot; op.code(11:8) override selects R(idx).
  [[instr.slots]]
    alu_y = "4"
    arith = "SUB"
    ma_addy = "ZBUS"
    ma_data = "YBUS"
    ma_op = "WRITE"
    ma_size = "32"
    pc = "INC"
    xbus = "R15"
    ybus = "Rn"
    zbus = "R15"
    zbus_sel = "ARITH"

# SH-2A MOVMU.L @R15+,Rn : pop R0..Rn and PR (PR from the highest address,
# R15+4*(n+1)); R15 += 4*(n+2). Restart-safe (R15 pristine until the terminal;
# loads idempotent). THREE slots: slot0 = register-load loop (decode_core
# re-presents it n+1x, idx 0..n), slot1 = PR load (op.code(11:8):=n+1), slot2 =
# terminal R15 update (op.code(11:8):=n+2). disp rides op.code(11:8) via UH*4.
[[instr]]
  name = "MOVMU.L @R15+,Rn"
  format = "n"
  opcode = "0100 nnnn 1111 0100"
  operation = "R15->R(0..n), (R15+4*(n+1))->PR, R15+4*(n+2)->R15"
  table_ref = "SH-2A"

  # slot0 (looped n+1x): register load @ R15+idx*4 -> R(idx). W-port only.
  [[instr.slots]]
    alu_y = "UH*4"      # IMM_U_H4_2 = op.code(11:8) << 2 = idx*4
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "32"
    pc = "HOLD"
    wbus = "Rn"
    xbus = "R15"
    zbus_sel = "ARITH"

  # slot1 (once): PR load @ R15+(n+1)*4 -> PR. decode_core drives op.code(11:8):=n+1.
  # W-port (PR) only; R15 still not written.
  [[instr.slots]]
    alu_y = "UH*4"      # = (n+1)*4
    arith = "ADD"
    ma_addy = "ZBUS"
    ma_op = "READ"
    ma_size = "32"
    pc = "HOLD"
    wbus = "PR"
    xbus = "R15"
    zbus_sel = "ARITH"

  # slot2 (terminal, once): R15 += (n+2)*4. decode_core drives op.code(11:8):=n+2.
  # Z-port only -> no clash.
  [[instr.slots]]
    alu_y = "UH*4"      # = (n+2)*4
    arith = "ADD"
    pc = "INC"
    xbus = "R15"
    zbus = "R15"
    zbus_sel = "ARITH"

[[instr]]
  name = "MOVI20 #imm20,Rn"
  format = "ni20"
  opcode = "0000 nnnn iiii 0000"
  opcode2 = "iiii iiii iiii iiii"
  operation = "sign_extend(imm20) → Rn"
  table_ref = "SH-2A"
  # slot0: latch the second opcode word (imm[15:0]) and pulse if_issue to
  # advance the fetch-ahead buffer one word (same as the disp12 family).
  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"
  # slot1 (held): 0 + imm20 -> Rn. alu_x=zero (SEL_ZERO), alu_y="S" (signed,
  # width 20 from format, shift 0 -> IMM_S_20_0) sourced from the latched
  # ext_word via imm_from_ext; zbus=ARITH sum -> Rn.
  [[instr.slots]]
    imm_from_ext = "1"
    alu_x = "zero"
    alu_y = "S"
    arith = "ADD"
    pc = "INC"
    zbus_sel = "ARITH"
    zbus = "Rn"

[[instr]]
  name = "MOVI20S #imm20,Rn"
  format = "ni20"
  opcode = "0000 nnnn iiii 0001"
  opcode2 = "iiii iiii iiii iiii"
  operation = "sign_extend(imm20) << 8 → Rn"
  table_ref = "SH-2A"
  [[instr.slots]]
    latch_ext = "1"
    pc = "INC"
    if_issue = "YES"
  # slot1 (held): (sign_extend(imm20) << 8) -> Rn. alu_y="S*256" (signed,
  # width 20, shift 8 -> IMM_S_20_8).
  [[instr.slots]]
    imm_from_ext = "1"
    alu_x = "zero"
    alu_y = "S*256"
    arith = "ADD"
    pc = "INC"
    zbus_sel = "ARITH"
    zbus = "Rn"
