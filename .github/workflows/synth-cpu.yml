name: synth-cpu
# Full-cpu synthesis CI. Gates on synthesizability (no latches/loops via
# `check -assert`) and FPGA fit; timing is REPORTED, not gated.
#   synth-asic: generic yosys synth + check + cell/area stats
#   synth-ecp5: synth_ecp5 (abc9) + nextpnr-ecp5 (LFE5U-85F) + ecppack
# Timing is reported but not gated: with the issue/slot false loop broken
# (core/datapath.vhm) abc9 runs and the core reaches ~40 MHz on the 85F, still
# under 50. Tightening to a hard timing gate is a follow-up (critical-path work).
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

env:
  ECP5_TARGET_MHZ: "50"

# Container run: steps default to `sh` (dash), which rejects `set -o pipefail`
# and other bashisms. Force bash (present in the image) for all run steps.
defaults:
  run:
    shell: bash

jobs:
  synth-asic:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          ghdl --version | head -1; yosys -V | head -1
          yosys -m ghdl -p 'help ghdl' >/dev/null && echo "ghdl plugin OK"
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (generic) + assert no latches
        # cpu_synth.sh runs `check -assert` (fails on latches/multi-driver) and
        # writes build/cpu_asic.v. This step IS the synthesizability gate.
        run: synth/cpu_synth.sh asic
      - name: Report cell/area stats
        run: |
          set -euo pipefail
          yosys -p "read_verilog build/cpu_asic.v; stat" | tee build/asic_stat.txt
          cells=$(awk '/Number of cells:/ {n=$NF} END{print n}' build/asic_stat.txt)
          {
            echo "### ASIC generic synth"
            echo "- cells: ${cells:-?}"
            echo "- gate: \`check -assert\` (no latches / multi-driver) passed"
            echo "- timing: reported on ECP5; not gated (see workflow header)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-asic
          path: build/
          retention-days: 14

  synth-ecp5:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
      - name: Checkout jcore-soc (provides tools/v2p)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc
      - name: Toolchain versions
        run: |
          ghdl --version | head -1; yosys -V | head -1
          nextpnr-ecp5 --version; ecppack --help >/dev/null && echo "ecppack OK"
      - name: Generate decoder
        run: make -C decode generate
      - name: Preprocess vhm -> vhd (v2p)
        run: |
          set -eux
          for f in core/mult core/datapath decode/decode_core; do
            LD_LIBRARY_PATH='' perl "$GITHUB_WORKSPACE/jcore-soc/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
      - name: Synthesize (synth_ecp5 -noabc9) + assert no latches
        run: synth/cpu_synth.sh ecp5
      - name: Guard — slot_o is not in any combinational loop
        # Regression guard for the issue/slot loop break (core/datapath.vhm):
        # slot_o must stay out of every SCC. A residual SCC not involving slot_o
        # may remain (abc9 resolves it); we only fail if slot_o reappears.
        run: |
          set -euo pipefail
          yosys -m ghdl -p "
            ghdl --std=93 -fexplicit --ieee=synopsys --workdir=$(mktemp -d) \
              cpu2j0_pkg.vhd core/components_pkg.vhd core/mult_pkg.vhd core/datapath_pkg.vhd \
              decode/decode_pkg.vhd core/cpu.vhd core/mult.vhd core/datapath.vhd \
              core/register_file.vhd core/register_file_flops.vhd core/register_file_two_bank.vhd \
              decode/decode.vhd decode/decode_body.vhd decode/decode_table.vhd \
              decode/decode_table_direct.vhd decode/decode_table_direct_config.vhd \
              decode/decode_core.vhd synth/cpu_synth_config.vhd -e cpu_synth_direct;
            hierarchy -top cpu; proc; flatten; opt; scc -nofeedback -select; select -list;
          " > build/scc_report.txt 2>&1
          grep -E 'Found [0-9]+ SCCs' build/scc_report.txt | tail -1 || true
          if grep -E '^cpu/' build/scc_report.txt | grep -q 'slot_o'; then
            echo "REGRESSION: slot_o is back in a combinational loop"; exit 1
          fi
          echo "OK: slot_o is not in any SCC"
      - name: Place and route (nextpnr-ecp5, LFE5U-85F) — fit gate
        run: |
          set -euo pipefail
          # The issue/slot false loop is broken (core/datapath.vhm), so abc9 runs
          # and nextpnr needs no --ignore-loops. --timing-allow-fail keeps the
          # ~40 MHz (< 50) result reported rather than failing. We GATE on fit
          # (P&R must complete) and REPORT timing. No `| tee`, so set -e fails the
          # step on a real P&R/fit error.
          nextpnr-ecp5 --85k --package CABGA381 \
            --json build/cpu_ecp5.json \
            --lpf synth/ulx3s_cpu.lpf --lpf-allow-unconstrained \
            --timing-allow-fail \
            --textcfg build/cpu_ecp5.config \
            --report build/cpu_ecp5_report.json > build/nextpnr.log 2>&1
          tail -60 build/nextpnr.log
      - name: Pack bitstream — fit gate
        run: ecppack build/cpu_ecp5.config build/cpu_ecp5.bit && ls -l build/cpu_ecp5.bit
      - name: Report Fmax + utilisation
        run: |
          set -eu
          {
            echo "### ECP5 synth + P&R (LFE5U-85F) — fits & packs a bitstream"
            grep -oE "Max frequency for clock '[^']*': [0-9.]+ MHz.*" build/nextpnr.log | tail -2 | sed 's/^/- Fmax: /' || true
            echo "- utilisation:"
            grep -E "Info:[[:space:]]+(TRELLIS_COMB|TRELLIS_FF|DP16KD|MULT18X18D|ALU54B|TRELLIS_IO|EHXPLLL):" build/nextpnr.log | sed -E 's/^Info:[[:space:]]*/    /' || true
            echo "- target ${ECP5_TARGET_MHZ} MHz is reported, not gated (see workflow header)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-ecp5
          path: build/
          retention-days: 14
