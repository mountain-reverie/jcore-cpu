# SH-4 register-model exception entry/return (J4 overlay; overrides the base
# SH-2 stack-model instructions by name). SPC = regfile 21, SSR = regfile 22.
# See docs/priv-arch/j4-implementation-design.md §4 and
# docs/priv-arch/pm3-fixed-vectors-expevt-design.md.
#
# Entry: SPC <- PC(-adjust) (zbus=SPC, zbus_sel=ARITH), then SSR<-SR +
# SEL_EXCEPTION, then capture the SH-4 cause code into EXPEVT/INTEVT(/TRA) via a
# constant-immediate slot, then a DIRECT fixed-vector jump PC <- VBR+0x100
# (general exceptions) or VBR+0x600 (interrupt). No vector-table memory read and
# no stack pushes. ALL six entries use the register model so the register-model
# RTE returns correctly.
#
# SH-4 cause codes (EXPEVT, decimal in spec): TRAPA 0x160=352 (+TRA=imm<<2),
# General Illegal 0x180=384, Slot Illegal 0x1A0=416, Error 0x100=256 (write
# address error); Interrupt INTEVT = the d8 event vector (op.code(7:0)).

# ---- Interrupt (maskable: capture level, set IMASK) ----
[[instr]]
  name = "Interrupt"
  format = "d8"
  # bit 11 MUST be 0 (not don't-care): the TLB exception system ops use nibbles
  # 0x8-0xD (bit 11 = 1) and share bits[10:8] with these base exceptions. A
  # don't-care here makes nibble 0x8 (TLB IMISS) alias Interrupt, leaking its
  # INTEVT/IMASK slots into the IMISS entry. See exceptions DMISS_R/Error below.
  opcode = "---- 0000 dddd dddd"
  operation = "SPC<-PC; SSR<-SR; MD/RB/BL; IMASK; INTEVT<-vec; PC<-VBR+0x600"
  plane = "system"

  [[instr.slots]]
    event = "ack"
    ilevel_capture = "Y"
    alu_y = "2"
    arith = "SUB"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]
    pc = "HOLD"
    sr = "INT_MASK"
  [[instr.slots]]                 # INTEVT <- d8 event vector
    xbus = "U"
    sr = "INTEVT"
    pc = "HOLD"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "1536"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- Error (event-driven; no IMASK) ----
[[instr]]
  name = "Error"
  format = "d8"
  # bit 11 = 0 explicitly: nibble 0x9 (TLB DMISS_R) would otherwise alias this
  # Error entry (both have bits[10:8]=001), making DMISS_R spuriously run Error's
  # EXPEVT<-0x100 slot and clobber the 0x060 side-effect value.
  opcode = "---- 0001 dddd dddd"
  operation = "SPC<-PC; SSR<-SR; MD/RB/BL; EXPEVT<-0x100; PC<-VBR+0x100"
  plane = "system"

  [[instr.slots]]
    event = "ack"
    alu_y = "2"
    arith = "SUB"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]                 # EXPEVT <- 0x100 (write address error)
    xbus = "256"
    sr = "EXPEVT"
    pc = "HOLD"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "256"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- Slot Illegal ----
[[instr]]
  name = "Slot Illegal"
  format = "d8"
  opcode = "---- 0110 dddd dddd"  # bit 11 = 0 (avoid TLB-nibble aliasing)
  operation = "SPC<-PC; SSR<-SR; MD/RB/BL; EXPEVT<-0x1A0; PC<-VBR+0x100"
  plane = "system"

  [[instr.slots]]
    alu_y = "0"
    arith = "ADD"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]                 # EXPEVT <- 0x1A0
    xbus = "416"
    sr = "EXPEVT"
    pc = "HOLD"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "256"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- General Illegal (restart = faulting instruction, PC-2) ----
[[instr]]
  name = "General Illegal"
  format = "d8"
  opcode = "---- 0111 dddd dddd"  # bit 11 = 0 (avoid TLB-nibble aliasing)
  operation = "SPC<-PC-2; SSR<-SR; MD/RB/BL; EXPEVT<-0x180; PC<-VBR+0x100"
  plane = "system"

  [[instr.slots]]
    alu_y = "2"
    arith = "SUB"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]                 # EXPEVT <- 0x180
    xbus = "384"
    sr = "EXPEVT"
    pc = "HOLD"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "256"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- TRAPA #imm (SPC = next instruction; all imm vector to VBR+0x100; the
#      handler reads TRA to recover imm) ----
[[instr]]
  name = "TRAPA #imm"
  format = "i8"
  opcode = "1100 0011 iiii iiii"
  operation = "SPC<-PC; SSR<-SR; MD/RB/BL; EXPEVT<-0x160; TRA<-imm<<2; PC<-VBR+0x100"

  [[instr.slots]]
    alu_y = "0"
    arith = "ADD"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]                 # EXPEVT <- 0x160
    xbus = "352"
    sr = "EXPEVT"
    pc = "HOLD"
  [[instr.slots]]                 # TRA <- imm << 2  (U*4 = op.code(7:0) << 2)
    xbus = "U*4"
    sr = "TRA"
    pc = "HOLD"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "256"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

# ---- RTE: SR <- SSR, PC <- SPC (delayed branch) ----
[[instr]]
  name = "RTE"
  privileged = true
  format = "0"
  opcode = "0000 0000 0010 1011"
  operation = "Delayed branch: SR<-SSR, PC<-SPC"
  table_ref = "A.23"

  [[instr.slots]]
    pc = "INC"
    ybus = "SSR"
    zbus_sel = "Y"
    sr = "Z"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SPC"
    zbus_sel = "Y"
    zbus = "PC"
  [[instr.slots]]
    pc = "HOLD"
    delay_jmp = "SET"
    if_addy = "ZBUS"

# ---- Privileged software access to SSR/SPC (design §5 Tier-1) ----
[[instr]]
  name = "STC SSR, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0011 0010"
  operation = "SSR -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "SSR"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "STC SPC, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0100 0010"
  operation = "SPC -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "SPC"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "LDC Rm, SSR"
  privileged = true
  format = "m"
  opcode = "0100 mmmm 0011 1110"
  operation = "Rm -> SSR"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "Rm"
    zbus = "SSR"
    zbus_sel = "Y"

[[instr]]
  name = "LDC Rm, SPC"
  privileged = true
  format = "m"
  opcode = "0100 mmmm 0100 1110"
  operation = "Rm -> SPC"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "Rm"
    zbus = "SPC"
    zbus_sel = "Y"

# ---- Privileged read of the SH-4 cause registers (PM3; control space
#      0000nnnn ssss 0010, ssss = 0101/0110/0111; SR/GBR/VBR/SSR/SPC take
#      0000-0100). Read-only: the registers are hardware-set on entry. ----
[[instr]]
  name = "STC EXPEVT, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0101 0010"
  operation = "EXPEVT -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "EXPEVT"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "STC INTEVT, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0110 0010"
  operation = "INTEVT -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "INTEVT"
    zbus = "Rn"
    zbus_sel = "Y"

[[instr]]
  name = "STC TRA, Rn"
  privileged = true
  format = "n"
  opcode = "0000 nnnn 0111 0010"
  operation = "TRA -> Rn"
  [[instr.slots]]
    mask_int = "YES"
    pc = "INC"
    ybus = "TRA"
    zbus = "Rn"
    zbus_sel = "Y"

# ---- TLB miss/protection exceptions (J4+MMU_ARCH; system-plane) ----
# Restart = faulting instruction, with distinct EXPEVT codes and per-access-type
# vector offsets.
# SPC source differs by fault stage:
#   * I-fetch faults (IMISS/IPROT) are detected at the fetch pointer, so SPC
#     comes from the live PC with the normal SPC<-PC-2 adjustment (alu_y=2).
#   * D-access faults (DMISS_R/W, DPROT_R/W) are detected in the MA stage, by
#     which time the live fetch PC has run a VARIABLE distance ahead of the
#     faulting instruction (e.g. +6 for a lone fault, +2 when another fault
#     immediately follows), so a fixed PC-N adjustment cannot recover it. Instead
#     the datapath latches the faulting instruction's restart-PC (tlb_exc_pc, the
#     stable ma_pc access-launch shadow) and SR (tlb_exc_sr) on the first fault
#     cycle, like TEA/PTEH. These D-side entries source SPC from TLBPC
#     (xbus=TLBPC, alu_y=4, SUB -> SPC = faulting instruction PC) and SSR from
#     TLBSR (ybus=TLBSR), so the resolved access RE-EXECUTES after LDTLB.RN/RTE.
#     Without this a faulting STORE returns past itself and the write is lost
#     (a faulting load is masked: its dest reg was already written).
# TEA and PTEH[31:12] are written as a datapath hardware side-effect when the
# fault is detected (see datapath.vhm).
# system_instr_codes: IMISS=x"8" DMISS_R=x"9" DMISS_W=x"A" IPROT=x"B"
#                     DPROT_R=x"C" DPROT_W=x"D".
# EXPEVT: IMISS=0x040 DMISS_R=0x060 DMISS_W=0x080 IPROT=0x0A0
#         DPROT_R=0x0C0 DPROT_W=0x0C0.
# Vectors (Option-A layout): I-fetch (IMISS/IPROT)->VBR+0x400 (=1024),
#   D-load (DMISS_R/DPROT_R)->VBR+0x420 (=1056), D-store (DMISS_W/DPROT_W)->VBR+0x440 (=1088).

[[instr]]
  name = "TLB IMISS"
  format = "d8"
  opcode = "---- 1000 dddd dddd"
  operation = "SPC<-PC-2; SSR<-SR; MD/RB/BL; EXPEVT<-0x040; PC<-VBR+0x400"
  plane = "system"
  [[instr.slots]]
    alu_y = "2"
    arith = "SUB"
    pc = "HOLD"
    xbus = "PC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "SR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]                 # EXPEVT <- fault cause
    xbus = "64"
    sr = "EXPEVT"
    pc = "HOLD"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "1024"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

[[instr]]
  name = "TLB DMISS R"
  format = "d8"
  opcode = "---- 1001 dddd dddd"
  operation = "SPC<-TLBPC-4 (faulting PC); SSR<-TLBSR; MD/RB/BL; EXPEVT<-0x060; PC<-VBR+0x420"
  plane = "system"
  [[instr.slots]]
    alu_y = "4"
    arith = "SUB"
    pc = "HOLD"
    xbus = "TLBPC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
    pc = "HOLD"
    ybus = "TLBSR"
    zbus = "SSR"
    zbus_sel = "Y"
    sr = "EXCEPTION"
  [[instr.slots]]                 # EXPEVT <- fault cause
    xbus = "96"
    sr = "EXPEVT"
    pc = "HOLD"
  [[instr.slots]]
    xbus = "VBR"
    ybus = "1056"
    arith = "ADD"
    zbus = "PC"
    zbus_sel = "ARITH"
    pc = "HOLD"
  [[instr.slots]]
    if_addy = "ZBUS"
    if_issue = "YES"
    pc = "HOLD"
  [[instr.slots]]
    dispatch = "YES"
    if_issue = "YES"
    pc = "INC"
  [[instr.slots]]

[[instr]]
  name = "TLB DMISS W"
  format = "d8"
  opcode = "---- 1010 dddd dddd"
  operation = "SPC<-TLBPC-4 (faulting PC); SSR<-TLBSR; MD/RB/BL; EXPEVT<-0x080; PC<-VBR+0x440"
  plane = "system"
  [[instr.slots]]
    alu_y = "4"
    arith = "SUB"
    pc = "HOLD"
    xbus = "TLBPC"
    zbus = "SPC"
    zbus_sel = "ARITH"
  [[instr.slots]]
