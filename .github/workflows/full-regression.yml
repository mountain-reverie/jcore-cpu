name: full-regression

# Complete 8-step regression: runs decode/gen-go/regression.sh end-to-end
# inside the prebuilt heavy-toolchain container (GHDL 6.x, yosys 0.44 +
# ghdl-yosys-plugin@07a30ed, sh2-elf-gcc, opensta, Nangate45 Liberty).
#
# Triggered on:
#   - push to master/main           (gates merges)
#   - pull_request                  (runs the MMU/priv-arch functional guards
#                                     per-PR; the heavy 8-step regression.sh job
#                                     is gated off PRs — see its `if:` below)
#   - nightly schedule (08:00 UTC)  (catches toolchain drift)
#   - manual workflow_dispatch      (re-run on demand)
#
# The container is built by build-ci-image.yml and published to
# ghcr.io/<owner>/jcore-cpu-ci:latest. If the image is missing, this
# workflow will fail at the container pull step — run build-ci-image.yml
# first (see .github/ci/README.md).

on:
  push:
    branches:
      - master
      - main
  pull_request:
  schedule:
    # 08:00 UTC every day. Cron uses UTC regardless of repo timezone.
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: full-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-regression:
    name: regression.sh (all 8 steps)
    # Heavy (~90 min synth + STA). Keep it on master-push / nightly / dispatch;
    # PRs run only the MMU functional-guards job below.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    container:
      # ghcr.io normalizes registry paths to lowercase on push/pull, so a
      # mixed-case repository_owner (e.g. "J-Core") still resolves correctly.
      # build-ci-image.yml does the lowercase normalization at push time.
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
      # The image ships every toolchain at /usr/local/bin and the Nangate45
      # Liberty file at /opt/nangate45/nangate45.lib. No extra mounts needed.
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    env:
      # Step 8 (openSTA) looks at NANGATE_LIB before falling back to
      # /tmp/sky130/lib/nangate45.lib (which doesn't exist in CI).
      NANGATE_LIB: /opt/nangate45/nangate45.lib
      # Stable workspace for synth artifacts so a later step can upload them.
      SYNTH_OUT: ${{ github.workspace }}/synth-out

    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
        with:
          path: jcore-cpu

      - name: Checkout jcore-soc (TOOLS_DIR)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc

      - name: Show toolchain versions
        run: |
          set -eu
          echo "--- go ---"; go version
          echo "--- ghdl ---"; ghdl --version | head -3
          echo "--- yosys ---"; yosys -V | head -2
          echo "--- sh2-elf-gcc ---"; sh2-elf-gcc --version | head -1
          echo "--- sta ---"; sta -version 2>&1 | head -2 || true
          echo "--- ghdl-yosys-plugin ---"; yosys -m ghdl -p 'help ghdl' 2>&1 | head -3 || true
          echo "--- nangate45 ---"; ls -la "$NANGATE_LIB"

      - name: Run full regression.sh (Steps 1-8)
        working-directory: jcore-cpu
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: |
          mkdir -p "$SYNTH_OUT"
          bash decode/gen-go/regression.sh

      - name: Upload synthesis + STA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-out
          path: ${{ env.SYNTH_OUT }}
          if-no-files-found: ignore
          retention-days: 14

  # Assembly functional guards: the priv-arch + MMU exception tests in
  # sim/tests/*.S. These need BOTH the SH cross-toolchain (sh2-elf-gcc, to build
  # the test .img) AND -- for mmucolor -- the jcore-soc cache/memory_tech_lib
  # deps. pr-quick has neither, so the guards run here (heavy-toolchain
  # container + mountain-reverie/jcore-soc). This job DOES run per-PR (it is the
  # MMU CI gate); only the heavy 8-step regression.sh job above is PR-gated off. Without this job, none of the
  # exception-path work (per-access-type vectors, EXPEVT persistence, RTE return
  # from a TLB exception, D-store fault detection + write suppression, IMISS TEA
  # capture, SR-state-on-entry, VIPT page-coloring) is exercised in CI.
  functional-guards:
    name: priv-arch + MMU functional guards
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
        with:
          path: jcore-cpu

      - name: Checkout jcore-soc (tools + cache deps)
        uses: actions/checkout@v4
        with:
          repository: mountain-reverie/jcore-soc
          path: jcore-soc

      - name: Build MMU-on co-sim + run all functional guards
        working-directory: jcore-cpu
        # The CI image runs container steps under `sh` (dash) by default, which
        # rejects `set -o pipefail` (and the `local`/`${var:+...}` bashisms
        # below). Force bash so the guard script runs as written.
        shell: bash
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
          JCORE_SOC: ${{ github.workspace }}/jcore-soc
        run: |
          set -euo pipefail
          # J4 overlay decoder (PRIV_ARCH + MMU instructions).
          make -C decode generate-j4
          # Regenerate the M8 fault-coverage test images from the spec.
          make -C decode m8gen
          # Generator-diff gate: fail if committed images are out of sync.
          if ! git diff --quiet -- sim/tests/m8_dside.S sim/tests/m8_ifetch.S sim/tests/m8_manifest.txt; then
            echo "FAIL: committed m8 images out of sync with spec — run 'make -C decode m8gen' and commit"
            git diff --stat -- sim/tests/m8_*.S sim/tests/m8_manifest.txt
            exit 1
          fi
          # The dcache CCL/MCL cores are .vhm templates; preprocess to .vhd via
          # jcore-soc's v2p so cpu_cache_tb (mmucolor) elaborates on a clean CI
          # checkout (same as sim/cache_sim.sh / synth).
          for f in cache/dcache_ccl cache/dcache_mcl; do
            LD_LIBRARY_PATH='' perl "$JCORE_SOC/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
          # One MMU-on build provides BOTH cpu_tb (the 16 cpu_ctb guards) and
          # cpu_cache_tb (mmucolor, selected at run time via SIM_TOP).
          cd sim
          rm -f work-obj93.cf cpu_tb.vhh cpu_ctb
          make TOOLS_DIR="$TOOLS_DIR" JCORE_SOC="$JCORE_SOC" \
            CONFIG_PRIV_ARCH=1 CONFIG_MMU_ARCH=1 \
            cpu_ctb cpu_tb cpu_cache_tb work-obj93.cf >/dev/null
          grep -q 'MMU_ARCH => true' cpu_tb.vhh \
            || { echo "FAIL: build is not MMU-on (stale cpu_tb.vhh?)"; exit 1; }

          fail=0
          run_guard() {  # <name> <sim_top-or-default> [stop-time] [wall-timeout-s]
            local t="$1" top="${2:-}" stoptime="${3:-80us}" wall="${4:-120}"
            rm -f tests/$t.img tests/$t.o tests/$t.elf
            make CONFIG_PRIV_ARCH=1 CONFIG_MMU_ARCH=1 -C tests $t.img >/dev/null 2>&1
            local out
            out="$(SIM_TOP="$top" timeout "$wall" ./cpu_ctb --stop-time="$stoptime" \
                   -i tests/$t.img --ieee-asserts=disable 2>&1 || true)"
            if echo "$out" | grep -qi 'Test Passed'; then
              echo "  PASS  $t${top:+ [$top]}"
            else
              echo "  FAIL  $t${top:+ [$top]}"
              echo "$out" | grep -iE 'result|fail|invalid' | tail -3
              fail=1
            fi
          }

          # priv-arch + MMU guards run on the default cpu_tb top.
          for t in exctest trapatest pm3vec pm3guard privmode banktest excguard \
                   rteredir mmureg mmuguard mmuxlate mmurte mmustore mmuimiss \
                   mmusr mmufault mmuldtlbr mmutsb mmuidx mmustres mmustr2 \
                   mmurun mmuirun mmuainc mmuainc2; do
            run_guard "$t"
          done
          # VIPT page-coloring runs the CPU through the live D-cache (cpu_cache_tb).
          run_guard mmucolor cpu_cache_tb
          # M8 D-side fault-transparency sweep (30 cases; needs 200us to complete).
          run_guard m8_dside "" 200us
          # M8 MAC-arithmetic guard (short, 80us is sufficient).
          run_guard m8_macarith
          # M8 I-fetch fault-transparency sweep. 72 General non-memory cases are
          # EMITTED but only the first 30 are DISPATCHED (IFetchDispatchCap): the
          # co-sim hangs beyond a ~38-case cumulative-fetch ceiling (a co-sim
          # limit, not a CPU defect -- every case is precise standalone and 1..38
          # pass in sequence). 30 cases fit well under that; 12ms stop-time covers
          # them (Test Passed ends the sim early). Generous wall timeout (240s).
          run_guard m8_ifetch "" 12ms 240

          [ "$fail" = 0 ] || { echo "==> functional guards FAILED" >&2; exit 1; }
          echo "==> all 29 priv-arch + MMU functional guards PASSED"
