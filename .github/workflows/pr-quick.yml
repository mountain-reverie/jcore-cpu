name: pr-quick

# Fast PR feedback loop. Runs Steps 1-5 of decode/gen-go/regression.sh, plus a
# J1 sequential-multiplier in-pipeline check:
#   1. Go unit tests
#   2. make -C decode generate
#   3. cpu_ctb 180us with direct decoder
#   4. cpu_ctb 180us with ROM decoder
#   4b. J4 (sh4 overlay, PRIV_ARCH=1) decoder elaboration gate
#   5. make -C tests check (228 TAP unit tests)
#   6. cpu_ctb with mult(seq) -- the ONLY functional guard for the J1
#      sequential multiplier (cpu_j1 is never otherwise simulated).
#
# Step 4b elaborates the J4-overlay decoder (all three architectures:
# simple/direct/rom). `make -C decode generate-j4` succeeding does NOT mean
# the generated VHDL elaborates — the IMM_P256 constant-immediate blocker
# generated cleanly but failed to elaborate, and nothing built the overlay
# decoder, so the break was invisible until a local J4 build. This step
# closes that gap.
#
# Steps 7 (yosys synthesis) and 8 (openSTA) are deliberately deferred to
# full-regression.yml: their toolchains are too expensive on every push.
#
# Target wall-clock budget: under 10 minutes per run.

on:
  push:
    branches-ignore:
      # Avoid duplicate runs: master / main are covered by full-regression.yml.
      - master
      - main
  pull_request:
    branches:
      - master
      - main

# Newer pushes to the same branch cancel in-flight runs.
concurrency:
  group: pr-quick-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-quick:
    name: Go + simulator + TAP (Steps 1-5)
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
        with:
          path: jcore-cpu

      - name: Checkout jcore-soc (TOOLS_DIR)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc

      - name: Install apt dependencies (GHDL, GCC, make)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ghdl ghdl-mcode \
            gcc make build-essential \
            python3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: jcore-cpu/decode/gen-go/go.mod
          cache: true
          cache-dependency-path: jcore-cpu/decode/gen-go/go.sum

      - name: Show toolchain versions
        run: |
          go version
          ghdl --version | head -3
          gcc --version | head -1
          make --version | head -1

      - name: Run regression Steps 1-5
        working-directory: jcore-cpu
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: |
          set -euo pipefail
          # Step 1: Go unit tests
          echo "==> Step 1: go test ./..."
          go -C decode/gen-go test ./...

          # Step 2: regenerate VHDL
          echo "==> Step 2: make -C decode generate"
          make -C decode generate

          # Step 3: build + run cpu_ctb with direct decoder
          echo "==> Step 3: cpu_ctb 180us [direct decoder]"
          cd sim
          rm -f work-obj93.cf cpu_ctb
          make TOOLS_DIR="$TOOLS_DIR" cpu_ctb work-obj93.cf >/dev/null
          LED_LOG="$(mktemp)"
          timeout 90 ./cpu_ctb --stop-time=180us 2>&1 | grep "^LED:" > "$LED_LOG" || true
          wc -l "$LED_LOG"
          # Verify expected 20 LED writes.
          actual=$(wc -l < "$LED_LOG")
          if [ "$actual" -ne 20 ]; then
            echo "FAIL [direct]: expected 20 LED writes, got $actual" >&2
            cat "$LED_LOG" >&2
            exit 1
          fi
          rm -f "$LED_LOG"
          cd ..

          # Step 4: rebuild with ROM decoder and re-run.
          echo "==> Step 4: cpu_ctb 180us [ROM decoder]"
          CPU_CONFIG="core/cpu_config.vhd"
          CPU_CONFIG_BAK="$(mktemp)"
          cp "$CPU_CONFIG" "$CPU_CONFIG_BAK"
          # Restore on any exit (success, failure, or interruption).
          trap 'cp "$CPU_CONFIG_BAK" "$CPU_CONFIG"; rm -f "$CPU_CONFIG_BAK"' EXIT
          sed -i \
            '/^configuration cpu_sim of cpu/,/^end configuration/{
              s/use configuration work\.cpu_decode_direct;/use configuration work.cpu_decode_rom;/
            }' \
            "$CPU_CONFIG"
          cd sim
          rm -f work-obj93.cf cpu_ctb
          if ! make TOOLS_DIR="$TOOLS_DIR" cpu_ctb work-obj93.cf >/dev/null 2>&1; then
            echo "    NOTE: ROM decoder elaboration failed (pre-existing project state)."
            echo "          Skipping ROM run; this mirrors regression.sh behavior."
          else
            LED_LOG_ROM="$(mktemp)"
            timeout 90 ./cpu_ctb --stop-time=180us 2>&1 | grep "^LED:" > "$LED_LOG_ROM" || true
            actual=$(wc -l < "$LED_LOG_ROM")
            if [ "$actual" -ne 20 ]; then
              echo "FAIL [rom]: expected 20 LED writes, got $actual" >&2
              cat "$LED_LOG_ROM" >&2
              exit 1
            fi
            rm -f "$LED_LOG_ROM"
          fi
          cd ..
          # Restore config + rebuild direct for Step 5.
          cp "$CPU_CONFIG_BAK" "$CPU_CONFIG"
          rm -f "$CPU_CONFIG_BAK"
          trap - EXIT
          cd sim
          rm -f work-obj93.cf cpu_ctb
          make TOOLS_DIR="$TOOLS_DIR" cpu_ctb work-obj93.cf >/dev/null
          cd ..

          # Step 5: TAP unit testbenches
          echo "==> Step 5: make -C tests check"
          make -C tests check TOOLS_DIR="$TOOLS_DIR"

          # Step 6: J1 sequential-multiplier in-pipeline functional check.
          # The broken mult(seq) silently DROPPED back-to-back MAC.L (which issue
          # their command from the writeback stage, draining past any front
          # stall) and hung at LED 0x33 -- BEFORE the multiply tests. The
          # slot-stretch fix serialises them, so the multiply tests (0x41..0x47)
          # now pass in-pipeline. cpu_j1 is never otherwise simulated (the
          # testrom above runs on the comb J2 multiplier), so this is the only
          # functional guard against this class of J1 regression.
          echo "==> Step 6: cpu_ctb [mult(seq), J1 sequential multiplier]"
          CPU_CONFIG="core/cpu_config.vhd"
          CPU_CONFIG_BAK="$(mktemp)"
          cp "$CPU_CONFIG" "$CPU_CONFIG_BAK"
          trap 'cp "$CPU_CONFIG_BAK" "$CPU_CONFIG"; rm -f "$CPU_CONFIG_BAK"' EXIT
          # Bind only cpu_sim's multiplier to mult(seq) (leave the fast comb
          # shifter / two_bank regfile, so the multiplier is the slow unit).
          sed -i \
            '/^configuration cpu_sim of cpu is/,/^end configuration/{
              s|^  for stru$|  for stru\n    for u_mult : mult use entity work.mult(seq); end for;|
            }' \
            "$CPU_CONFIG"
          cd sim
          rm -f work-obj93.cf cpu_ctb
          make TOOLS_DIR="$TOOLS_DIR" cpu_ctb work-obj93.cf >/dev/null
          # mult_seq.vhd is not in the sim VHDS list; import it for elaboration.
          ghdl -i --std=93 --work=work ../core/mult_seq.vhd
          LED_LOG_J1="$(mktemp)"
          # mult(seq) is ~32 cycles/multiply (the multiply tests run slower), so
          # allow extra sim time; the whole testrom still finishes in seconds.
          # Line-buffer so the trace survives the timeout.
          timeout 720 stdbuf -oL ./cpu_ctb --stop-time=220us 2>&1 \
            | stdbuf -oL grep "^LED:" > "$LED_LOG_J1" || true
          echo "    mult(seq) LED trace:"; sed 's/^/      /' "$LED_LOG_J1"
          # Proof: the FULL testrom passes (20 LED writes, ending 0x62) -- exactly
          # the same trace as the direct/ROM runs above on the J2 multiplier. This
          # includes the multiply tests (0x41..0x47); the broken mult(seq) dropped
          # back-to-back MAC.L and hung at 0x33 (only 9 LED writes).
          actual=$(wc -l < "$LED_LOG_J1")
          if [ "$actual" -ne 20 ]; then
            echo "FAIL [mult(seq)]: expected 20 LED writes (full testrom), got $actual" >&2
            echo "      J1 sequential multiplier regressed (broken version hangs at 0x33 = 9 writes)" >&2
            exit 1
          fi
          if ! grep -qi "WRITE 0x47 " "$LED_LOG_J1"; then
            echo "FAIL [mult(seq)]: multiply tests (..0x47) not reached -- J1 regressed" >&2
            exit 1
          fi
          echo "    mult(seq): full testrom passed (20 writes, multiply tests 0x41..0x47 incl.)"
          rm -f "$LED_LOG_J1"
          cd ..
          cp "$CPU_CONFIG_BAK" "$CPU_CONFIG"; rm -f "$CPU_CONFIG_BAK"; trap - EXIT

          echo "==> pr-quick: Steps 1-6 PASSED"

      - name: J4 overlay decoder elaboration (Step 4b)
        working-directory: jcore-cpu
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: |
          set -euo pipefail
          # Generate the J4 (sh4 overlay) decoder and analyze the DUT with
          # CONFIG_PRIV_ARCH=1. Building work-obj93.cf runs `ghdl -a` over all
          # three decoder architectures (decode_table_{simple,direct,rom}.vhd)
          # against the overlay-generated tables. This is the elaboration gate
          # the base steps don't exercise: a constant-immediate (or any other)
          # overlay codegen break that generates cleanly but won't elaborate
          # fails HERE rather than silently on a developer's local J4 build.
          echo "==> generate-j4 (sh4 overlay)"
          make -C decode generate-j4
          echo "==> analyze J4 DUT [CONFIG_PRIV_ARCH=1] — all three decoders"
          cd sim
          rm -f work-obj93.cf cpu_tb.vhh cpu_ctb
          make TOOLS_DIR="$TOOLS_DIR" CONFIG_PRIV_ARCH=1 work-obj93.cf >/dev/null
          cd ..
          # Restore the base (production, PRIV_ARCH=0) decoder so the working
          # tree matches the committed generated files, and assert the base
          # output is byte-identical (generate-j4 must not perturb base).
          echo "==> restore base decoder + verify byte-identical"
          make -C decode generate
          make -C decode diff
          echo "==> Step 4b: J4 overlay elaboration PASSED"
