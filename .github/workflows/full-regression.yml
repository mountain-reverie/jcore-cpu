name: full-regression

# Complete 8-step regression: runs decode/gen-go/regression.sh end-to-end
# inside the prebuilt heavy-toolchain container (GHDL 6.x, yosys 0.44 +
# ghdl-yosys-plugin@07a30ed, sh2-elf-gcc, opensta, Nangate45 Liberty).
#
# Triggered on:
#   - push to master/main           (gates merges)
#   - pull_request                  (runs the MMU/priv-arch functional guards
#                                     per-PR; the heavy 8-step regression.sh job
#                                     is gated off PRs — see its `if:` below)
#   - nightly schedule (08:00 UTC)  (catches toolchain drift)
#   - manual workflow_dispatch      (re-run on demand)
#
# The container is built by build-ci-image.yml and published to
# ghcr.io/<owner>/jcore-cpu-ci:latest. If the image is missing, this
# workflow will fail at the container pull step — run build-ci-image.yml
# first (see .github/ci/README.md).

on:
  push:
    branches:
      - master
      - main
  pull_request:
  schedule:
    # 08:00 UTC every day. Cron uses UTC regardless of repo timezone.
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: full-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-regression:
    name: regression.sh (all 8 steps)
    # Heavy (~90 min synth + STA). Keep it on master-push / nightly / dispatch;
    # PRs run only the MMU functional-guards job below.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    container:
      # ghcr.io normalizes registry paths to lowercase on push/pull, so a
      # mixed-case repository_owner (e.g. "J-Core") still resolves correctly.
      # build-ci-image.yml does the lowercase normalization at push time.
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
      # The image ships every toolchain at /usr/local/bin and the Nangate45
      # Liberty file at /opt/nangate45/nangate45.lib. No extra mounts needed.
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    env:
      # Step 8 (openSTA) looks at NANGATE_LIB before falling back to
      # /tmp/sky130/lib/nangate45.lib (which doesn't exist in CI).
      NANGATE_LIB: /opt/nangate45/nangate45.lib
      # Stable workspace for synth artifacts so a later step can upload them.
      SYNTH_OUT: ${{ github.workspace }}/synth-out

    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
        with:
          path: jcore-cpu

      - name: Checkout jcore-soc (TOOLS_DIR)
        uses: actions/checkout@v4
        with:
          repository: j-core/jcore-soc
          path: jcore-soc

      - name: Show toolchain versions
        run: |
          set -eu
          echo "--- go ---"; go version
          echo "--- ghdl ---"; ghdl --version | head -3
          echo "--- yosys ---"; yosys -V | head -2
          echo "--- sh2-elf-gcc ---"; sh2-elf-gcc --version | head -1
          echo "--- sta ---"; sta -version 2>&1 | head -2 || true
          echo "--- ghdl-yosys-plugin ---"; yosys -m ghdl -p 'help ghdl' 2>&1 | head -3 || true
          echo "--- nangate45 ---"; ls -la "$NANGATE_LIB"

      - name: Run full regression.sh (Steps 1-8)
        working-directory: jcore-cpu
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
        run: |
          mkdir -p "$SYNTH_OUT"
          bash decode/gen-go/regression.sh

      - name: Upload synthesis + STA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-out
          path: ${{ env.SYNTH_OUT }}
          if-no-files-found: ignore
          retention-days: 14

  # Assembly functional guards: the priv-arch + MMU exception tests in
  # sim/tests/*.S. These need BOTH the SH cross-toolchain (sh2-elf-gcc, to build
  # the test .img) AND -- for the cpu_cache_tb guards -- the jcore-soc cache/memory_tech_lib
  # deps. pr-quick has neither, so the guards run here (heavy-toolchain
  # container + mountain-reverie/jcore-soc). This job DOES run per-PR (it is the
  # MMU CI gate); only the heavy 8-step regression.sh job above is PR-gated off. Without this job, none of the
  # exception-path work (per-access-type vectors, EXPEVT persistence, RTE return
  # from a TLB exception, D-store fault detection + write suppression, IMISS TEA
  # capture, SR-state-on-entry, PIPT address relocation) is exercised in CI.
  functional-guards:
    name: priv-arch + MMU functional guards
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
        with:
          path: jcore-cpu

      - name: Checkout jcore-soc (tools + cache deps)
        uses: actions/checkout@v4
        with:
          repository: mountain-reverie/jcore-soc
          path: jcore-soc

      # mmulinux (SP2) drives the REAL linux@jcore MMU TLB-miss handler
      # (arch/sh/mm/tlb-jcore.c, arch/sh/kernel/cpu/jcore/{ex,entry}.S)
      # against the RTL. It needs kbuild's objects (from mountain-reverie/linux)
      # plus a J4-aware gas/ld/objcopy (from mountain-reverie/binutils-gdb):
      # the system sh2-elf-* toolchain's gas has no PRIV_ARCH/MMU insns, and
      # its bfd rejects the newer e_flags the WIP J4 gas stamps ("relocations
      # in generic ELF" / "file in wrong format" — toolchain skew, not a real
      # relocation error). See sim/linux_sim.sh for the full rationale.
      - name: Checkout binutils-gdb (J4 gas/ld/objcopy)
        uses: actions/checkout@v4
        with:
          repository: mountain-reverie/binutils-gdb
          ref: jcore
          path: binutils-gdb

      - name: Resolve binutils-gdb commit sha
        id: binutils-sha
        working-directory: binutils-gdb
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache J4 gas/ld/binutils build
        id: binutils-cache
        uses: actions/cache@v4
        with:
          path: |
            binutils-gdb/build-sh2/gas/as-new
            binutils-gdb/build-sh2/ld/ld-new
            binutils-gdb/build-sh2/binutils/objdump
            binutils-gdb/build-sh2/binutils/objcopy
            binutils-gdb/build-sh2/binutils/nm-new
            binutils-gdb/build-sh2/binutils/ar
          key: binutils-sh2-${{ steps.binutils-sha.outputs.sha }}

      - name: Build J4 gas/ld/binutils (build-sh2)
        if: steps.binutils-cache.outputs.cache-hit != 'true'
        working-directory: binutils-gdb
        # Container steps default to dash, which rejects `set -o pipefail`.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-sh2
          cd build-sh2
          ../configure --target=sh-elf --disable-gdb --disable-sim --disable-werror
          make -j"$(nproc)" all-gas all-ld all-binutils

      - name: Checkout linux@jcore (real MMU handler sources)
        uses: actions/checkout@v4
        with:
          repository: mountain-reverie/linux
          ref: jcore
          path: linux

      - name: Install kernel-build deps (bc/bison/flex)
        # The kernel prepare stage needs bc (timeconst.h); bison/flex are the
        # other classic kbuild prerequisites. Not in the base CI container.
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y --no-install-recommends bc bison flex

      - name: Build linux@jcore MMU objects (kbuild via the WIP J4 gas)
        env:
          LINUX_SRC: ${{ github.workspace }}/linux
          J4GAS: ${{ github.workspace }}/binutils-gdb/build-sh2/gas/as-new
          J4BIN: ${{ github.workspace }}/j4bin
        # Container steps default to dash, which rejects `set -o pipefail`.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$J4BIN"
          ln -sf "$J4GAS" "$J4BIN/as"
          cd "$LINUX_SRC"
          make ARCH=sh CROSS_COMPILE=sh2-elf- CC="sh2-elf-gcc -B$J4BIN" jcore_defconfig
          make ARCH=sh CROSS_COMPILE=sh2-elf- CC="sh2-elf-gcc -B$J4BIN" \
               arch/sh/mm/tlb-jcore.o arch/sh/kernel/cpu/jcore/ex.o \
               arch/sh/kernel/cpu/jcore/entry.o \
               arch/sh/kernel/cpu/jcore/mmu_enable.o

      - name: Build MMU-on co-sim + run all functional guards
        working-directory: jcore-cpu
        # The CI image runs container steps under `sh` (dash) by default, which
        # rejects `set -o pipefail` (and the `local`/`${var:+...}` bashisms
        # below). Force bash so the guard script runs as written.
        shell: bash
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
          JCORE_SOC: ${{ github.workspace }}/jcore-soc
          LINUX_SRC: ${{ github.workspace }}/linux
          J4GAS: ${{ github.workspace }}/binutils-gdb/build-sh2/gas/as-new
          J4LD: ${{ github.workspace }}/binutils-gdb/build-sh2/ld/ld-new
          J4BIN: ${{ github.workspace }}/j4bin
        run: |
          set -euo pipefail
          # J4 overlay decoder (PRIV_ARCH + MMU instructions).
          make -C decode generate-j4
          # Regenerate the M8 fault-coverage test images from the spec.
          make -C decode m8gen
          # Generator-diff gate: fail if committed images are out of sync.
          if ! git diff --quiet -- sim/tests/m8_dside.S sim/tests/m8_ifetch_0.S sim/tests/m8_ifetch_1.S sim/tests/m8_ifetch_2.S sim/tests/m8_manifest.txt; then
            echo "FAIL: committed m8 images out of sync with spec — run 'make -C decode m8gen' and commit"
            git diff --stat -- sim/tests/m8_dside.S sim/tests/m8_ifetch_0.S sim/tests/m8_ifetch_1.S sim/tests/m8_ifetch_2.S sim/tests/m8_manifest.txt
            exit 1
          fi
          # The dcache CCL/MCL cores are .vhm templates; preprocess to .vhd via
          # jcore-soc's v2p so cpu_cache_tb elaborates on a clean CI
          # checkout (same as sim/cache_sim.sh / synth).
          for f in cache/dcache_ccl cache/dcache_mcl; do
            LD_LIBRARY_PATH='' perl "$JCORE_SOC/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
          # One MMU-on build provides BOTH cpu_tb (the 16 cpu_ctb guards) and
          # cpu_cache_tb (cache-side guards, selected at run time via SIM_TOP).
          cd sim
          rm -f work-obj93.cf cpu_tb.vhh cpu_ctb
          make TOOLS_DIR="$TOOLS_DIR" JCORE_SOC="$JCORE_SOC" \
            CONFIG_PRIV_ARCH=1 CONFIG_MMU_ARCH=1 \
            cpu_ctb cpu_tb cpu_cache_tb work-obj93.cf >/dev/null
          grep -q 'MMU_ARCH => true' cpu_tb.vhh \
            || { echo "FAIL: build is not MMU-on (stale cpu_tb.vhh?)"; exit 1; }

          fail=0
          run_guard() {  # <name> <sim_top-or-default> [stop-time] [wall-timeout-s]
            local t="$1" top="${2:-}" stoptime="${3:-80us}" wall="${4:-120}"
            rm -f tests/$t.img tests/$t.o tests/$t.elf
            make CONFIG_PRIV_ARCH=1 CONFIG_MMU_ARCH=1 -C tests $t.img >/dev/null 2>&1
            local out
            out="$(SIM_TOP="$top" timeout "$wall" ./cpu_ctb --stop-time="$stoptime" \
                   -i tests/$t.img --ieee-asserts=disable 2>&1 || true)"
            if echo "$out" | grep -qi 'Test Passed'; then
              echo "  PASS  $t${top:+ [$top]}"
            else
              echo "  FAIL  $t${top:+ [$top]}"
              echo "$out" | grep -iE 'result|fail|invalid' | tail -3
              fail=1
            fi
          }

          # priv-arch + MMU guards run on the default cpu_tb top.
          for t in exctest trapatest pm3vec pm3guard privmode banktest excguard \
                   rteredir mmureg mmuguard mmuxlate mmurte mmustore mmuimiss \
                   mmusr mmufault mmuldtlbr mmutsb mmuidx mmustres mmustr2 \
                   mmustale mmuasid mmurun mmuirun mmuainc mmuainc2 mmusmep; do
            run_guard "$t"
          done
          # I-side cacheability: instruction fetches run through the live I-cache
          # (cpu_cache_tb); proves a C=0 translated page bypasses the icache (fresh
          # self-modified code) vs a C=1 page caches (stale). 400us to complete.
          run_guard mmuicolor cpu_cache_tb 400us
          # D-side: a translated C=1 page caches a data read (stale after a P2
          # self-modify) vs a C=0 page bypasses (fresh). 200us to complete.
          run_guard mmudcbit cpu_cache_tb 200us
          # PIPT address relocation (cpu_cache_tb): a non-identity map (VPN 0x4 ->
          # PPN 0x6) must read/write/fetch the PPN's physical page, not the VA's.
          # D-store/load, I-fetch, and the C=0 uncacheable bypass.
          run_guard mmureloc   cpu_cache_tb 200us
          run_guard mmurelocif cpu_cache_tb 200us
          run_guard mmurelocbp cpu_cache_tb 200us
          # Variable page size guards: 4 KB control (pm=0, two distinct frames),
          # 16 KB / 64 KB / 1 MB single-size, and mixed-install-order pairs.
          run_guard mmupage4k       cpu_cache_tb 200us
          run_guard mmupagereloc16k cpu_cache_tb 200us
          run_guard mmupage16k  cpu_cache_tb 200us
          run_guard mmupage64k  cpu_cache_tb 200us
          run_guard mmupage1m   cpu_cache_tb 200us
          run_guard mmupagemix  cpu_cache_tb 200us
          run_guard mmupagemix2 cpu_cache_tb 200us
          # Realistic DMISS_W handler: fault on a store to an unmapped 16 KB
          # page, handler installs PTEL with pm=1 and RTEs to re-execute the
          # store through the new mapping. 300us stop-time for handler latency.
          run_guard mmupagewalk cpu_cache_tb 300us
          # M8 D-side fault-transparency sweep (34 cases; needs 200us to complete).
          run_guard m8_dside "" 200us
          # M8 MAC-arithmetic guard (short, 80us is sufficient).
          run_guard m8_macarith
          # M8 fault-then-clean-MAC regression guard (cited by core/datapath.vhm
          # acc_squash; short, default 80us is sufficient).
          run_guard m8_macseq
          # M8 I-fetch fault-transparency sweep. All 72 General non-memory cases
          # are EMITTED and DISPATCHED, partitioned into 3 sub-images of 24 cases
          # each. Each sub-image is a SEPARATE sim run (CPU reset), keeping every
          # run under the co-sim ~38-case cumulative-fetch ceiling (a co-sim limit,
          # not a CPU defect -- every case is precise). 12ms stop-time covers each
          # (Test Passed ends the sim early). Generous wall timeout (240s).
          run_guard m8_ifetch_0 "" 12ms 240
          run_guard m8_ifetch_1 "" 12ms 240
          run_guard m8_ifetch_2 "" 12ms 240

          # SP2: mmulinux links the REAL linux@jcore MMU TLB-miss handler
          # objects (built by kbuild above, via the WIP J4 gas/ld) against a
          # bare-metal harness (sim/tests/mmulinux.S) covering scenarios 1-3
          # (real __jcore_tlb_walk install, warm TSB hit, ASID isolation).
          # LINUX_SRC/J4GAS/J4LD/J4BIN are exported above; sim/tests/Makefile's
          # `?=` defaults pick them up. 200us matches sim/linux_sim.sh.
          run_guard mmulinux "" 200us 120
          # SP3-c: mmuboot links the REAL linux@jcore head_32.S MMU-enable
          # sequence (jcore_mmu_enable, built by kbuild above) and proves the
          # boot bring-up SP2 never covered: AT enables, a present-page
          # translated access relocates, an absent-page access hits the miss
          # vector. Same LINUX_SRC/J4GAS/J4LD/J4BIN + sh32_p1.x link.
          run_guard mmuboot "" 200us 120
          # J4-TLB SP2 Task 6: mmuhuge links the same REAL linux@jcore MMU
          # TLB-miss handler objects and proves the REAL __jcore_tlb_walk()
          # installs a multi-size huge TLB entry (PageMask != base 16 KB)
          # from a PTE carrying a page-size slot -- 64 KB (slot 1) and 1 MB
          # (slot 3), each verified by both a cross-16KB-sub-page masked-
          # compare hit and the installed TSB PTEL encoding. Same
          # LINUX_SRC/J4GAS/J4LD/J4BIN + sh32_p1.x link as mmulinux/mmuboot.
          run_guard mmuhuge "" 200us 120
          # Scenarios 4-5 (deferred) and any exhaustive/slow mmulinux variant
          # would run only on the nightly schedule, e.g.:
          # if [ "${{ github.event_name }}" = "schedule" ]; then
          #   run_guard mmulinux_exhaustive "" 400us 240
          # fi

          [ "$fail" = 0 ] || { echo "==> functional guards FAILED" >&2; exit 1; }
          echo "==> all 47 priv-arch + MMU functional guards PASSED"

  # SP3-d: the 2-core SMP-bring-up guard (spin-table secondary release + IPI via
  # the real icache_modereg) runs on cpu_dualcore_tb. It is a BASE-J2 SMP test
  # and MUST be built with the base decoder + no PRIV_ARCH/MMU_ARCH: the
  # J4/priv-arch overlay changes the SR/banking/exception model and breaks the
  # guard's cpu1 path after release. So it gets its own lightweight base-J2 job
  # (no binutils/linux needed -- the test is pure SH-2 built by sh2-elf-gcc).
  smp-dualcore-guard:
    name: SMP dualcore bring-up guard
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout jcore-cpu
        uses: actions/checkout@v4
        with:
          path: jcore-cpu
      - name: Checkout jcore-soc (tools + cache deps)
        uses: actions/checkout@v4
        with:
          repository: mountain-reverie/jcore-soc
          path: jcore-soc
      - name: Build cpu_dualcore_tb (base-J2) + run smp_bringup
        working-directory: jcore-cpu
        shell: bash
        env:
          TOOLS_DIR: ${{ github.workspace }}/jcore-soc/tools
          JCORE_SOC: ${{ github.workspace }}/jcore-soc
        run: |
          set -euo pipefail
          # base-J2 decoder (NOT generate-j4 -- the guard is base-J2).
          make -C decode generate
          # v2p the .vhm cache cores the dualcore TB needs (incl icache_modereg,
          # the IPI block); the sim Makefile has no %.vhd:%.vhm pattern rule.
          for f in cache/dcache_ccl cache/dcache_mcl cache/icache_ccl \
                   cache/icache_mcl cache/icache_modereg; do
            LD_LIBRARY_PATH='' perl "$JCORE_SOC/tools/v2p" < "$f.vhm" > "$f.vhd"
          done
          cd sim
          make TOOLS_DIR="$TOOLS_DIR" JCORE_SOC="$JCORE_SOC" \
            cpu_ctb cpu_dualcore_tb work-obj93.cf >/dev/null
          bash tests/dualcore/run_bringup.sh
